# Host nginx site config for ec2sim.brumbiesoft.org
# This replaces the dockerized nginx container since the host nginx
# already occupies ports 80/443 for multiple sites.
#
# Install on server:
#   sudo cp ec2sim-host-site.conf /etc/nginx/sites-available/ec2sim.brumbiesoft.org
#   sudo ln -sf /etc/nginx/sites-available/ec2sim.brumbiesoft.org /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=ec2sim_login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=ec2sim_api:10m rate=30r/s;

# WebSocket upgrade map (may already be defined globally — if nginx errors, remove this)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name ec2sim.brumbiesoft.org;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name ec2sim.brumbiesoft.org;

    # --- SSL (Cloudflare Origin Certificate) ---
    ssl_certificate     /opt/edge-c2-sim/nginx/ssl/origin.pem;
    ssl_certificate_key /opt/edge-c2-sim/nginx/ssl/origin-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # --- Security Headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https://cesium.com https://cdn.cesium.com https://assets.cesium.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.cesium.com https://*.arcgisonline.com https://*.mapbox.com https://*.virtualearth.net; connect-src 'self' wss://ec2sim.brumbiesoft.org https://*.cesium.com https://assets.cesium.com https://*.virtualearth.net https://*.bing.com; worker-src 'self' blob:;" always;

    # --- Auth Service (NO auth_request on these) ---
    location /auth/ {
        limit_req zone=ec2sim_login burst=3 nodelay;

        proxy_pass http://127.0.0.1:8280;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Internal auth validation endpoint ---
    location = /auth/validate {
        internal;
        proxy_pass http://127.0.0.1:8280/auth/validate;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Cookie $http_cookie;
    }

    # --- WebSocket (Simulator) ---
    location /ws {
        auth_request /auth/validate;
        error_page 401 = @login_redirect;

        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;

        # WebSocket timeouts
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # --- Health Check (public, no auth) ---
    location /health {
        proxy_pass http://127.0.0.1:8766/health;
        proxy_set_header Host $host;
    }

    # --- API endpoints (scenarios list, etc.) ---
    location /api/ {
        auth_request /auth/validate;
        error_page 401 = @login_redirect;
        proxy_pass http://127.0.0.1:8766;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- COP Dashboard (protected) ---
    location / {
        auth_request /auth/validate;
        error_page 401 = @login_redirect;

        proxy_pass http://127.0.0.1:3200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Login redirect handler ---
    location @login_redirect {
        return 302 /auth/login?next=$request_uri;
    }

    # --- Block sensitive paths ---
    location ~ /\. {
        deny all;
    }
}
