    symbol_set: S
    speed_range_kn: [8, 14]
    notes: "Oil tankers, LNG carriers"

  - type: "CIVILIAN_FISHING"
    domain: MARITIME
    agency: CIVILIAN
    sidc_2525d: "SNSP------"
