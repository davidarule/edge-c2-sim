# Entity Types — Canonical Reference
# Version: 1.0 | Built: April 2026
#
# MIL-STD-2525D SIDC FORMAT:
#   Position 1:   Version (always 'S' for 2525D)
#   Position 2:   Standard Identity
#                   F = Friend, H = Hostile, N = Neutral, U = Unknown, S = Suspect/Assumed Hostile
#   Position 3:   Symbol Set
#                   A = Air, S = Sea Surface, U = Sea Subsurface, G = Ground
#   Position 4-10: Entity/modifier codes
#
# STANDARD IDENTITY CODES used in simulation:
#   F = Friend (own forces / allied)
#   N = Neutral (civilian, commercial)
#   S = Suspect (dark targets, unknown vessels)
#   H = Hostile (confirmed threat — used after positive ID)
#   U = Unknown (unidentified contact)
#
# SYMBOL SET (position 3):
#   Air:             'A' → SFAP (friend air), SNAP (neutral air)
#   Sea Surface:     'S' → SFSP (friend surface), SNSP (neutral surface), SHSP (hostile surface)
#   Sea Subsurface:  'U' → SFUP (friend sub), SNUP (neutral sub)
#   Ground:          'G' → SFGP (friend ground), SNGP (neutral ground)
#
# NOTE: SIDCs in the simulator use 10-character codes with dashes for unused fields.
# Example: "SFSP------" = Standard + Friend + Sea Surface + Paddlesteamer (generic surface)

entity_types:

  # ============================================================
  # MARITIME — CIVILIAN / NEUTRAL
  # ============================================================

  - type: "CIVILIAN_CARGO"
    domain: MARITIME
    agency: CIVILIAN
    sidc_2525d: "SNSP------"
    standard_identity: N    # Neutral
    symbol_set: S           # Sea Surface
    speed_range_kn: [8, 16]
    notes: "General cargo vessels, bulk carriers, container ships transiting TSS"

  - type: "CIVILIAN_TANKER"
    domain: MARITIME
    agency: CIVILIAN
    sidc_2525d: "SNSP------"
