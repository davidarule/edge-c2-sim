# ============================================================
# SIDC AUDIT NOTES — Issues found in loader.py ENTITY_TYPES
# ============================================================
sidc_audit:
  - finding: "SUSPECT_VESSEL was SHSP (Hostile). Should be SUSP (Unknown) initially."
    current: "SHSP------"
    corrected: "SUSP------"
    entity_type: SUSPECT_VESSEL

  - finding: "All MIL_INFANTRY_SQUAD/RMP_TACTICAL_TEAM use SFGP but domain is GROUND_VEHICLE in loader — should be PERSONNEL."
    affected: [MIL_INFANTRY_SQUAD, RMP_TACTICAL_TEAM, RMP_OFFICER, CI_OFFICER, CI_IMMIGRATION_TEAM, HOSTILE_PERSONNEL, CIVILIAN_TOURIST]
    action: "Update domain from GROUND_VEHICLE to PERSONNEL in loader.py for these types."

  - finding: "CIVILIAN_CARGO/TANKER/FISHING/PASSENGER all use SNSP which is correct for Neutral Sea Surface."
    status: CORRECT

  - finding: "RMAF_TRANSPORT should be SFAP not SFGP — it is an air asset."
    current_in_loader: "SFAP------"
    status: CORRECT

  - finding: "MIL_SUBMARINE not yet defined in loader.py. Required for scenario use."
    action: "Add MIL_SUBMARINE entity type with domain MARITIME and sidc SFUP------"
