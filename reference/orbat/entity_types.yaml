  # ============================================================
  # MARITIME — SUSPECT / UNKNOWN
  # ============================================================

  - type: "SUSPECT_VESSEL"
    domain: MARITIME
    agency: CIVILIAN
    sidc_2525d: "SUSP------"
    standard_identity: U    # CHANGED: Was 'S' (Suspect) — use 'U' (Unknown) for initial detection
    symbol_set: S
    speed_range_kn: [0, 40]
    notes: |
      Use 'U' (Unknown) for initial AIS-dark contacts.
      Change to 'S' (Suspect) via event when identity confirmed suspect.
      Change to 'H' (Hostile) via event when armed/confirmed threat.

  - type: "HOSTILE_VESSEL"
    domain: MARITIME
    agency: CIVILIAN
    sidc_2525d: "SHSP------"
    standard_identity: H    # Hostile — confirmed threat
    symbol_set: S
    speed_range_kn: [0, 40]

