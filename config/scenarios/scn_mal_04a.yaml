# SCN-MAL-04A: Unknown Submarine Contact — ASW Response
# Schema reference: docs/scenario-schema.md
# Version: 2.1
# Schema: v2 (action-based reactive chains)
# Created: 2026-04-17
# Author: BrumbieSoft
#
# Changelog:
#   v2.1 (2026-04-19) — Corrected aircraft type from Beechcraft Super
#     King Air B200T to Leonardo ATR 72-600 MPA (P-72M). Updated sensor
#     fits to match RMAF P-72M configuration: Seaspray 7300E AESA radar,
#     ULISSES acoustic system, EO/IR turret, ESM/ELINT suite. Adjusted
#     MPA-002 transit speed to 250kn (ATR 72 cruise speed).
#   v2.0 (2026-04-17) — Complete rewrite to action-based reactive chains.
#     Zero waypoints. Submarine prosecution with escape bearing changes.
#     MPA orbit/search patterns via actions. Frigate sonar prosecution
#     chain. Surface demand via diplomatic event dependency.
#   v1.0 (2026-04-10) — Original waypoint-based scenario (scn_mal_04.yaml)

scenario:
  name: "SCN-MAL-04A: Unknown Submarine Contact — ASW Response, Reactive Chain"
  description: >
    RMAF maritime patrol aircraft detects anomalous MAD contact in the
    northern Malacca Strait — submerged vessel at periscope depth, no
    transit notification on file. RMN activates ASW response: frigate
    with hull sonar, second MPA scrambled, OPV establishes northern
    barrier. Contact eventually identified as Indonesian submarine
    KRI Nagapasa on undeclared transit — administrative error.

    Demonstrates: multi-domain ASW operations, MPA-surface coordination,
    submarine contact prosecution, diplomatic notification protocol.
  duration_minutes: 60
  start_time: 2026-04-15T15:00:00Z  # 23:00 MYT — night submarine infiltration
  center: {lat: 5.30, lon: 100.00}
  zoom: 9
  background:
    include:
      - ais_background_malacca.yaml

  scenario_entities:

    # TUDM Peregrine 2 — MPA on patrol, detects contact
    - id: RMAF-MPA-001
      type: RMAF_MPA
      callsign: TUDM Peregrine 2
      agency: RMAF
      initial_position:
        lat: 5.400
        lon: 100.100
        speed_kn: 250       # ATR 72 transit speed
        heading_deg: 220
      metadata:
        aircraft_type: Leonardo ATR 72-600 MPA (P-72M)
        home_base: {lat: 3.970, lon: 103.420}  # RMAF Kuantan
        altitude_ft: 5000   # Search altitude (500 ft only for ID runs)
        sensors: [ULISSES_acoustic_system, sonobuoys_multistatic, Seaspray_7300E_AESA_radar, EO_IR_turret, ESM_ELINT, AIS]
        mission_system: Leonardo ATOS (4 operator consoles)
        endurance_hours: 10

    # KD Lekiu — primary ASW frigate
    - id: RMN-FF-001
      type: MIL_NAVAL_FRIGATE
      callsign: KD Lekiu
      agency: MIL
      initial_position:
        lat: 5.300
        lon: 100.050
        speed_kn: 15
        heading_deg: 160   # SSE — not coincidentally toward the undetected contact
      metadata:
        vessel_type: Lekiu-class Guided Missile Frigate
        hull_number: "30"
        callsign_radio: KD LEKIU
        sensors: [hull_mounted_sonar, towed_array, Type_996_radar]

    # KD Kedah — northern surface barrier
    - id: RMN-OPV-001
      type: MIL_NAVAL
      callsign: KD Kedah
      agency: MIL
      initial_position:
        lat: 5.600
        lon: 99.800
        speed_kn: 12
        heading_deg: 210
      metadata:
        vessel_type: Kedah-class Offshore Patrol Vessel
        hull_number: "171"
        callsign_radio: KD KEDAH

    # CONTACT ALPHA — submerged submarine, heading SE.
    - id: CONTACT-001
      type: MIL_SUBMARINE
      callsign: SUBMERGED CONTACT ALPHA
      sidc: "10013500001100000000"
      spawn_at: "23:59:59"
      initial_position:
        lat: 5.220
        lon: 99.890
        speed_kn: 9
        heading_deg: 120
      metadata:
        ais_active: false
        vessel_type: Diesel-electric submarine (Type 209/1300)
        estimated_depth_m: 45

  events:

    # ========================================
    # PHASE 1: DETECTION
    # ========================================

    - id: routine_patrol
      time: "00:00"
      type: DETECTION
      description: MPA on routine patrol, northern strait.
      on_initiate: >
        TUDM Peregrine 2 on routine maritime patrol, northern Malacca
        Strait. Altitude 5 000 ft. ULISSES passive acoustic monitoring
        active. Seaspray 7300E in maritime search mode. Commercial
        traffic normal.
      alert_agencies: [RMAF]
      actionee: RMAF-MPA-001
      action: transit
      # Destination is ~1.4 nm past the physical overfly point (5.2151, 99.8985)
      # on heading 227°. Aircraft flies through the overfly at T+03:56 and
      # continues on the same heading for ~20 s before mpa_search banks it
      # into the expanding square.
      destination: {lat: 5.1993, lon: 99.8815}
      speed: 250
      altitude_m: 1524   # 5 000 ft cruise
      on_complete: >
        TUDM Peregrine 2 past overfly — ULISSES continuing acoustic analysis.

    - id: mad_alert
      time: "00:03:56"   # Aircraft physically over the sub at 250 kn from start
      type: DETECTION
      description: ULISSES acoustic system declares — submerged contact detected.
      on_initiate: >
        TUDM Peregrine 2: ACOUSTIC CONTACT — ULISSES passive detection
        confirmed. Bearing 055° relative, range estimated 0.4 nm.
        Narrowband signature consistent with diesel-electric submarine
        at slow speed. ATOS mission system correlating all sensor data.
        Executing contact prosecution protocol.
      source: RMAF-MPA-001
      alert_agencies: [RMAF, MIL]
      severity: WARNING
      actionee: CONTACT-001
      action: activate

    - id: mpa_search
      after: {event: mad_alert, phase: initiate, offset: "00:00:15"}
      type: ORDER
      description: Peregrine 2 banks into expanding-square search.
      on_initiate: >
        TUDM Peregrine 2 banking left into localisation pattern — slowing
        to 160 kn, expanding-square steps one nautical mile outward.
        ULISSES switching to active/passive multistatic mode.
      actionee: RMAF-MPA-001
      action: search_pattern
      search_center: CONTACT-001
      search_step_nm: 1.0
      search_iterations: 12
      search_speed: 160
      altitude_m: 1524   # 5 000 ft search altitude (descends to 500 ft only for ID run)
      alert_agencies: [RMAF, MIL]

    - id: sonobuoy_1
      after: {event: mad_alert, phase: initiate, offset: "00:00:02"}
      type: DETECTION
      description: Sonobuoy 1 jettisoned — ULISSES multistatic field initiated.
      on_initiate: >
        TUDM Peregrine 2: first ULISSES sonobuoy deployed on acoustic
        mark — channel 1 active. Multistatic tracking initiated.
      actionee: RMAF-MPA-001
      action: drop_sonobuoy
      channel: 1
      alert_agencies: [RMAF, MIL]

    - id: sonobuoy_2
      after: {event: sonobuoy_1, phase: initiate, offset: "00:02:30"}
      type: DETECTION
      description: Sonobuoy 2 deployed.
      on_initiate: >
        TUDM Peregrine 2: sonobuoy channel 2 away. ULISSES triangulating.
      actionee: RMAF-MPA-001
      action: drop_sonobuoy
      channel: 2
      alert_agencies: [RMAF, MIL]

    - id: sonobuoy_3
      after: {event: sonobuoy_2, phase: initiate, offset: "00:02:30"}
      type: DETECTION
      description: Sonobuoy 3 deployed.
      on_initiate: >
        TUDM Peregrine 2: sonobuoy channel 3 away.
      actionee: RMAF-MPA-001
      action: drop_sonobuoy
      channel: 3
      alert_agencies: [RMAF, MIL]

    - id: sonobuoy_4
      after: {event: sonobuoy_3, phase: initiate, offset: "00:02:30"}
      type: DETECTION
      description: Sonobuoy 4 deployed — ULISSES multistatic field complete.
      on_initiate: >
        TUDM Peregrine 2: sonobuoy channel 4 away. Four-buoy ULISSES
        multistatic field complete — continuous acoustic tracking active.
        Contact bearing, range, depth and course now available via
        multistatic triangulation.
      actionee: RMAF-MPA-001
      action: drop_sonobuoy
      channel: 4
      alert_agencies: [RMAF, MIL]

    - id: mad_confirmed
      after: {event: mad_alert, phase: initiate, offset: "00:02:00"}
      type: ALERT
      description: ULISSES confirms submerged contact — diesel-electric submarine.
      on_initiate: >
        TUDM Peregrine 2: CONTACT CONFIRMED — diesel-electric submarine.
        ULISSES multistatic tracking: contact moving SE at 8-9 knots,
        depth 40-50m. Seaspray 7300E detecting intermittent periscope
        returns. ATOS correlating all sources. Datum established 5.21°N
        99.91°E. No submarine transit notification on file. Classify
        UNKNOWN SUBMARINE CONTACT ALPHA.
      source: RMAF-MPA-001
      position: {lat: 5.210, lon: 99.912}
      alert_agencies: [RMAF, MIL]
      severity: CRITICAL

    # ========================================
    # PHASE 2: ASW RESPONSE
    # ========================================

    - id: asw_activated
      after: {event: mad_confirmed}
      type: ORDER
      description: RMN Western Fleet activates ASW response.
      on_initiate: >
        RMN Western Fleet: ASW response activated. KD Lekiu diverted
        to datum at best speed. KD Kedah moving to northern barrier.
      alert_agencies: [RMAF, MIL]
      severity: CRITICAL

    - id: lekiu_intercept
      after: {event: asw_activated}
      type: ORDER
      description: KD Lekiu diverted to prosecute contact.
      on_initiate: >
        KD Lekiu proceeding to datum at 28 knots. Hull-mounted sonar
        and towed array standing by.
      actionee: RMN-FF-001
      action: intercept
      target: CONTACT-001
      speed: 28
      alert_agencies: [MIL]
      on_complete: >
        KD Lekiu on datum. Active sonar — contact echo confirmed.
        Bearing 275°, depth 45m, heading 098°, speed 8kn.
      on_complete_action: orbit
      orbit_center: CONTACT-001
      orbit_radius_nm: 1.5
      orbit_speed: 12

    - id: kedah_barrier
      after: {event: asw_activated, phase: initiate, offset: "00:03:00"}
      type: ORDER
      description: KD Kedah ordered to northern barrier position.
      on_initiate: >
        KD Kedah ordered north to barrier position — cut off Andaman
        Sea exit route. Prevent contact transiting unidentified.
      actionee: RMN-OPV-001
      action: transit
      destination: {lat: 5.482, lon: 99.698}
      speed: 22
      alert_agencies: [MIL]
      severity: CRITICAL
      on_complete: >
        KD Kedah in barrier position. Northern chokepoint covered.
      on_complete_action: hold_station

    # ========================================
    # PHASE 3: PROSECUTION & INTELLIGENCE
    # ========================================

    - id: lofar_analysis
      after: {event: mad_confirmed, phase: initiate, offset: "00:07:00"}
      type: DETECTION
      description: ULISSES LOFAR analysis identifies submarine type.
      on_initiate: >
        Peregrine 2 ULISSES LOFAR: narrowband propulsion signature
        suggests Type 209 or similar. Regional operators: Indonesia
        (Nagapasa-class), Singapore (Archer-class), Myanmar. Indonesia
        most probable based on acoustic library match.
      source: RMAF-MPA-001
      alert_agencies: [MIL]
      severity: WARNING

    - id: contact_tracked
      after: {event: lofar_analysis, phase: initiate, offset: "00:06:00"}
      type: DETECTION
      description: ULISSES multistatic field tracking contact SE.
      on_initiate: >
        Contact tracked by ULISSES multistatic sonobuoy field.
        Speed 8kn, heading 095-105° SE. Depth 40-55m — periscope
        depth regime. Seaspray 7300E intermittent periscope/snorkel
        returns correlate with acoustic track. Contact likely unaware
        of prosecution.
      source: RMAF-MPA-001
      position: {lat: 5.168, lon: 99.975}
      alert_agencies: [MIL]

    - id: diplomatic_protocol
      after: {event: contact_tracked, phase: initiate, offset: "00:04:00"}
      type: ALERT
      description: Diplomatic notification protocol activated.
      on_initiate: >
        Indonesian naval attaché contacted — no knowledge of authorised
        transit. Submarine squadron contacted directly. DIPLOMATIC
        NOTIFICATION PROTOCOL activated — Malaysian Chief of Navy
        notified.
      alert_agencies: [MIL]
      severity: CRITICAL

    - id: sub_reacts
      after: {event: lekiu_intercept, phase: complete, offset: "00:04:00"}
      type: DETECTION
      description: Contact alters course — possible awareness of prosecution.
      actionee: CONTACT-001
      action: escape
      bearing_deg: 105
      speed: 7

    - id: surface_demand
      after: {event: diplomatic_protocol, phase: initiate, offset: "00:10:00"}
      type: ALERT
      description: RMN authorises surface demand — UWT transmitted.
      on_initiate: >
        RMN Western Fleet authorises SURFACE DEMAND. Peregrine 2
        transmits on underwater telephone. No response. KD Lekiu
        maintaining contact — possible depth change.
      alert_agencies: [MIL]
      severity: CRITICAL

    # ========================================
    # PHASE 4: IDENTIFICATION & RESOLUTION
    # ========================================

    - id: indonesia_confirms
      after: {event: diplomatic_protocol, phase: initiate, offset: "00:04:00"}
      type: ALERT
      description: Indonesian Navy confirms — KRI Nagapasa on undeclared transit.
      on_initiate: >
        Indonesian Navy HQ CONFIRMATION: KRI Nagapasa (403),
        Type 209/1400. Transit notification filed with Indonesian
        liaison only — NOT transmitted to Malaysian MMOC.
        Administrative error, not hostile intent.
      alert_agencies: [MIL]
      severity: WARNING

    - id: surface_renewed
      after: {event: indonesia_confirms, phase: initiate, offset: "00:04:00"}
      type: ORDER
      description: Surface demand renewed through diplomatic channel.
      on_initiate: >
        Contact identified as KRI Nagapasa — friendly TNI-AL sub.
        Surface demand renewed via diplomatic channel. KD Lekiu
        maintaining safe standoff. MPAs passive monitoring only.
      actionee: CONTACT-001
      action: escape
      bearing_deg: 100
      speed: 3
      alert_agencies: [MIL]

    - id: contact_surfaces
      after: {event: surface_renewed, phase: initiate, offset: "00:03:00"}
      type: DETECTION
      description: Submarine surfaces — KRI Nagapasa identified visually.
      on_initiate: >
        KRI Nagapasa surfacing. KD Lekiu visual: Indonesian Navy
        submarine, pennant 403. VHF contact established. Indonesian
        flag hoisted. Incident professional — no hostile action.
      actionee: CONTACT-001
      action: hold_station
      source: RMN-FF-001
      position: {lat: 5.115, lon: 100.028}
      alert_agencies: [MIL]
      reclassify:
        targets: [CONTACT-001]
        new_type: MIL_SUBMARINE_FRIENDLY
      callsign_override: "KRI Nagapasa (403)"

    - id: endstate
      after: {event: contact_surfaces, phase: initiate, offset: "00:05:00"}
      type: RESOLUTION
      description: Scenario complete — contact identified, diplomatic note prepared.
      on_initiate: >
        ENDSTATE — KRI Nagapasa identified and surface-navigating under
        RMN escort. Transit notification admin error. Detection to
        identification in 45 minutes. One P-72M MPA with ULISSES,
        one frigate, one OPV coordinated via single COP.
      alert_agencies: [RMAF, MIL]
