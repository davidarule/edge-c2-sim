#   KD Jerong to northern block:    24.1nm @ 22kn = 66min ORDER T+28  patrol    ✓
#   MPA Labuan to scene:           227nm @ 220kn = 62min  ORDER T+32  ARR T+55+ ✓
#
# ── FORCES ──────────────────────────────────────────────────────────────────
#   HOSTILE-001/002: Armed speedboats (Abu Sayyaf-linked militants)
#   RMP-MP-201/202/203: RMP Marine Police Semporna (first responders)
#   RMP-GOF-201: GOF Team Alpha — Lahad Datu (heli-inserted)
