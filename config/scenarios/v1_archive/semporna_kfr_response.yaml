#
# ── DEMO NOTES ──────────────────────────────────────────────────────────────
# Duration: 75 min. Recommended: 3x (25 min), 5x (15 min).
# Pause at T+18 (landfall — hostage taking begins).
# Pause at T+38 (hostiles flee — pursuit begins).
# This is the most dramatic scenario — cross-border attack, hostages, pursuit.
# Strong ESSZONE message: permanent multi-agency presence saved lives.

scenario:
