# with the hostiles already in Malaysian waters (crossing happened pre-scenario).
# ESSCOM activates full multi-agency response under Operation Pasir protocols.
# Militants flee with hostages — multi-agency pursuit across the Sulu Sea.
#
# ── PHYSICS VALIDATION ──────────────────────────────────────────────────────
# cos(4.5°) ≈ 0.9969, 1°lon ≈ 59.8nm
#
#   HOSTILE approach to Bum Bum:    12nm @ 25kn = 29min  (pre-T+00 to T+15) ✓
#   RMP Marine Semporna to Bum Bum:  2.8nm @ 30kn = 6min  ORDER T+12  ARR T+18 ✓
