  # ================================================================
  # EVENTS TIMELINE
  # ================================================================
  events:

    - time: "00:00"
      type: "DETECTION"
      description: "ESSCOM routine surveillance. ESSZONE security posture ELEVATED. Operation Pasir sea curfew in effect — all vessels must be in port 1800-0600. Two fast-moving contacts detected on coastal radar Station 10 (Semporna sector), bearing 065°, range 12nm, speed 25 knots. Approaching from Sulu Sea."
      position: { lat: 4.58, lon: 118.82 }
      alert_agencies: [MIL, MMEA]
      severity: "WARNING"

    - time: "00:05"
      type: "ALERT"
      description: "ESSCOM Fusion Centre: contacts assessed as potential hostile incursion — speed, heading, and time of night consistent with cross-border attack pattern from Sulu Archipelago. No AIS. Not responding to VHF Channel 16 hails. Two contacts, parallel track, 25 knots heading SW toward Semporna islands. THREAT ASSESSMENT: HIGH."
      alert_agencies: [RMP, MIL, MMEA, RMAF, CI]
      severity: "CRITICAL"

    - time: "00:08"
      type: "ALERT"
      description: "ESSCOM flags immediate threat to Semporna island communities. Contacts now 8nm from Pulau Bum Bum and closing. Speed reducing to 20 knots — consistent with coastal approach. All Semporna-based assets placed on IMMEDIATE READINESS."
      alert_agencies: [RMP, MIL, MMEA]
      severity: "CRITICAL"

    - time: "00:10"
      type: "ORDER"
      description: "ESSCOM activates Operation Pasir enhanced protocols — sea curfew zone expanded around Semporna. RMN G2000 Charlie diverted from ESSZONE patrol to establish eastern blocking position."
      target: "RMN-FIC-202"
      action: "deploy"
      destination: { lat: 4.72, lon: 118.90 }

    - time: "00:12"
      type: "ORDER"
      description: "RMP Marine Police Semporna ordered to intercept approaching contacts. Three PX-class boats launching from Semporna Jetty."
      targets: ["RMP-MP-201", "RMP-MP-202", "RMP-MP-203"]
      action: "intercept"
      intercept_target: "HOSTILE-001"

    - time: "00:15"
      type: "ORDER"
      description: "RMN scrambles KD G2000 Bravo from Semporna naval detachment. Contacts now making landfall approach — speed dropping to 10 knots among island channels."
      target: "RMN-FIC-201"
      action: "intercept"
      intercept_target: "HOSTILE-001"

    - time: "00:18"
      type: "ALERT"
      description: "CONTACTS MAKE LANDFALL — Pulau Bum Bum. Two speedboats beached at fishing village north shore. Armed men — automatic weapons observed. PDRM Marine 01 reports: 12-15 armed militants storming village. Gunshots heard. Situation: HOSTAGE CRISIS."
      position: { lat: 4.47, lon: 118.66 }
      alert_agencies: [RMP, MIL, MMEA, RMAF, CI]
      severity: "CRITICAL"

    - time: "00:20"
      type: "ALERT"
      description: "Fisherman escapes from Bum Bum village, contacts RMP via mobile phone. Reports: 12-15 armed men with rifles and RPG. Multiple hostages taken — Malaysian villagers and 3 foreign tourists (identified later as 2 Japanese and 1 Korean dive tourists). Militants are Abu Sayyaf-linked. Demanding ransom."
      alert_agencies: [RMP, MIL, MMEA, RMAF, CI]
      severity: "CRITICAL"

    - time: "00:22"
      type: "ORDER"
      description: "ESSCOM declares CRITICAL INCIDENT. Full multi-agency activation. GOF Team Bravo scrambled from Semporna — deploying to Bum Bum by fast boat. ETA 8 minutes."
      target: "RMP-GOF-202"
      action: "deploy"
      destination: { lat: 4.47, lon: 118.66 }

    - time: "00:24"
      type: "ORDER"
      description: "RMAF dispatches EC725 from Lahad Datu FOB for armed aerial surveillance over Bum Bum. FLIR, searchlight, door gun. ETA 14 minutes."
      target: "RMAF-HELI-201"
      action: "deploy"
      destination: { lat: 4.47, lon: 118.66 }

    - time: "00:25"
      type: "ORDER"
      description: "RMAF Blackhawk dispatched to airlift GOF Team Alpha from Lahad Datu to Semporna staging area. 16 operators with full assault kit. ETA Semporna 15 minutes."
      target: "RMAF-HELI-202"
      action: "deploy"
      destination: { lat: 4.49, lon: 118.62 }

    - time: "00:26"
      type: "ORDER"
      description: "MMEA orders all patrol vessels to enforce expanded sea curfew — no unauthorized vessels to leave Semporna waters. KM Semporna and KM Kilat 3 deploying."
      targets: ["MMEA-PV-201", "MMEA-FI-201"]
      action: "deploy"

    - time: "00:28"
      type: "ORDER"
      description: "RMN diverts KD Jerong from Darvel Bay patrol to block northern escape route toward Sulu Sea. Proceeding at 22 knots."
      target: "RMN-PV-201"
      action: "deploy"
      destination: { lat: 4.60, lon: 118.85 }

    - time: "00:30"
      type: "ORDER"
      description: "Immigration Department activates border lockdown — all sea crossings Semporna and Tawau suspended. Customs Marine Unit at Semporna Jetty activated."
      targets: ["CI-BORDER-201", "CI-BORDER-202"]
      action: "lockdown"

    - time: "00:32"
      type: "ORDER"
      description: "RMAF MPA launched from Labuan for wide-area maritime surveillance of Sulu Sea approaches. Monitor for any additional hostile boats. ETA 30 minutes."
      target: "RMAF-MPA-201"
      action: "deploy"
      destination: { lat: 4.75, lon: 119.00 }

    - time: "00:35"
      type: "DETECTION"
      description: "RMAF EC725 arrives over Pulau Bum Bum. FLIR confirms: militants gathered at village centre, hostages visible — seated group under armed guard. Two speedboats on beach with engines running. GOF Bravo securing perimeter from southern approach."
      source: "RMAF-HELI-201"
      position: { lat: 4.47, lon: 118.66 }
      alert_agencies: [RMP, MIL, RMAF]
      severity: "CRITICAL"

    - time: "00:38"
      type: "ALERT"
      description: "HOSTILE SPEEDBOATS DEPARTING — militants loading hostages onto boats! EC725 reports both boats pulling off beach heading NE at high speed. ESSCOM orders all available intercept assets to pursue. RMAF EC725 tracking from air."
      alert_agencies: [RMP, MIL, MMEA, RMAF]
      severity: "CRITICAL"

    - time: "00:40"
      type: "ORDER"
      description: "ESSCOM orders all intercept assets to pursue. PDRM Marine 01 in pursuit of Speedboat 2 at 30 knots. G2000 Bravo repositioning to intercept. EC725 tracking both boats via FLIR."
      targets: ["RMP-MP-201", "RMN-FIC-201"]
      action: "intercept"
      intercept_target: "HOSTILE-002"

    - time: "00:42"
      type: "ALERT"
      description: "GOF Team Alpha arrives at Semporna staging via Blackhawk. 16 operators ready. Blackhawk refuelling — available for re-tasking."
      source: "RMP-GOF-201"

    - time: "00:50"
      type: "DETECTION"
      description: "Speedboat 2 slowing — engine trouble or running out of fuel. Position 4.66°N 118.90°E, speed dropping to 15 knots. G2000 Bravo and PDRM Marine 01 closing rapidly."
      source: "RMAF-HELI-201"
      target: "HOSTILE-002"

    - time: "00:55"
      type: "INTERCEPT"
      description: "G2000 Bravo and PDRM Marine 01 intercept Speedboat 2. Warning shots fired. Militants surrender after G2000 closes within 50m. 4 hostages recovered alive — 2 Malaysian villagers and 1 Japanese tourist. 6 militants detained. Weapons seized."
      source: "RMN-FIC-201"
      target: "HOSTILE-002"
      severity: "WARNING"

    - time: "01:00"
      type: "INTERCEPT"
      description: "G2000 Charlie intercepts Speedboat 1 near international boundary — 2nm from EEZ limit. EC725 overhead with searchlight and loudhailer. Militants cornered — G2000 Charlie blocking escape route, EC725 overhead. Negotiations via loudhailer. Militants release hostages — 5 persons (3 Malaysian villagers, 1 Japanese tourist, 1 Korean tourist). 8 militants detained."
      source: "RMN-FIC-202"
      target: "HOSTILE-001"
      severity: "CRITICAL"

    - time: "01:05"
      type: "ALERT"
      description: "All hostages recovered safely. GOF Team Alpha at Semporna secures detained militants from Speedboat 2 transfer. Immigration team processing identities of all detained persons."
      source: "RMP-GOF-201"
      alert_agencies: [RMP, CI]

    - time: "01:10"
      type: "ALERT"
      description: "ESSCOM notifies trilateral partners — Philippine and Indonesian Maritime Command Centres alerted for any further cross-border activity. Philippine Navy conducting sweep of Sulu Archipelago staging areas."
      alert_agencies: [MIL, MMEA]

    - time: "01:15"
      type: "ALERT"
      description: "ENDSTATE — All 9 hostages recovered safely (5 Malaysian, 2 Japanese, 1 Korean, 1 additional recovered on island). 14 militants detained across both speedboats. 2 speedboats seized. Weapons cache: 8 assault rifles, 1 RPG launcher, ammunition. Operation Pasir enhanced patrols continue 72 hours. ESSCOM multi-agency response: detection T+00 to all hostages recovered T+60 — 60 minutes. Critical success factors: coastal radar early warning, permanent ESSZONE force presence, RMAF rapid helicopter response, and multi-agency coordination via single COP."
      alert_agencies: [RMP, MIL, MMEA, RMAF, CI]
      severity: "INFO"
