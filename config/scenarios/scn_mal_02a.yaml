scenario:
  name: "SCN-MAL-02A: Tanker Armed Robbery — Reactive Chain"
  description: >
    Malaysian-flag VLCC transiting southern Strait of Malacca activates
    SSAS during night boarding. Multi-agency response using reactive
    event chains — zero waypoints, all action-driven.
  duration_minutes: 75
  center: {lat: 3.41, lon: 100.49}
  zoom: 9
  background:
    include:
      - ais_background_malacca.yaml
  # Legacy loader support
  include_entities:
    - ais_background_malacca.yaml
  background_entities: []

  scenario_entities:

    - id: TANKER-001
      type: CIVILIAN_TANKER
      callsign: MT Labuan Palm
      initial_position:
        lat: 3.392
        lon: 100.514
        speed_kn: 14
        heading_deg: 315
      metadata:
        ais_active: true
        mmsi: '533000777'
        flag: MYS
        vessel_type: VLCC Crude Tanker
        length_m: 300
        estimated_crew: 28
        cargo: Crude oil

    - id: PIRATE-001
      type: SUSPECT_VESSEL
      callsign: Unknown Boat 1
      sidc: "10013000001400000000"
      initial_position:
        lat: 3.389
        lon: 100.491
        speed_kn: 3
        heading_deg: 45
      metadata:
        ais_active: false
        vessel_type: Fast fibreglass boat ~10m
        armed: true
        estimated_crew: 6

    - id: PIRATE-002
      type: SUSPECT_VESSEL
      callsign: Unknown Boat 2
      sidc: "10013000001400000000"
      initial_position:
        lat: 3.392
        lon: 100.484
        speed_kn: 3
        heading_deg: 30
      metadata:
        ais_active: false
        vessel_type: Fast fibreglass boat ~10m
        armed: true
        estimated_crew: 5

    - id: MMEA-PV-001
      type: MMEA_PATROL
      callsign: KM Perantau
      agency: MMEA
      initial_position:
        lat: 3.220
        lon: 100.680
        speed_kn: 12
        heading_deg: 300
      metadata:
        mmsi: '533100200'
        flag: MYS
        vessel_type: MMEA 60m Patrol Vessel

    - id: RMP-UTK-001
      type: RMP_TACTICAL_TEAM
      callsign: UTK Team Alpha
      agency: RMP
      embarked_on: MMEA-PV-001
      initial_position:
        lat: 3.220
        lon: 100.680
      metadata:
        unit_name: UTK Team Alpha
        personnel_count: 12

    - id: RMN-OPV-001
      type: MIL_NAVAL
      callsign: KD Perak
      agency: MIL
      initial_position:
        lat: 3.150
        lon: 100.540
        speed_kn: 10
        heading_deg: 320
      metadata:
        mmsi: '533300173'
        flag: MYS
        vessel_type: Kedah-class OPV

    - id: RMAF-HELI-001
      type: RMAF_HELICOPTER
      callsign: TUDM Caracal 1
      agency: RMAF
      initial_position:
        lat: 3.131
        lon: 101.549
        speed_kn: 0
        heading_deg: 0
      metadata:
        aircraft_type: Airbus H225M Caracal
        home_base: {lat: 3.131, lon: 101.549}

  events:

    # ========================================
    # PHASE 1: DETECTION & ALERT
    # ========================================

    - id: tanker_tracking
      time: "00:00"
      type: DETECTION
      description: Normal AIS tracking of MT Labuan Palm.
      on_initiate: >
        MRCC Lumut: MT Labuan Palm (MMSI 533000777) tracking normally.
        14 knots, heading 315 NW through southern Strait of Malacca.
      position: {lat: 3.392, lon: 100.514}
      alert_agencies: [MMEA]

    - id: ssas_alert
      time: "00:05"
      type: DISTRESS
      description: Covert SSAS distress — pirates boarding.
      on_initiate: >
        SSAS COVERT ALERT — MT Labuan Palm. Ship Security Alert System
        activated. Two fast boats approaching from Indonesian side.
      target: TANKER-001
      alert_agencies: [MMEA, MIL, RMP]
      severity: CRITICAL

    # Pirates sprint to tanker on SSAS
    - id: pirate1_sprint
      after: "ssas_alert"
      type: DETECTION
      description: Pirate 1 sprints to tanker.
      target: PIRATE-001
      action: transit
      destination: {lat: 3.416, lon: 100.490}
      speed: 25
      sidc_override: "10053000001400000000"
      callsign_override: Suspect Boat 1
      on_complete_action: hold_station
      hold_target: TANKER-001

    - id: pirate2_sprint
      after: "ssas_alert"
      type: DETECTION
      description: Pirate 2 sprints to tanker area.
      target: PIRATE-002
      action: transit
      destination: {lat: 3.416, lon: 100.493}
      speed: 25
      sidc_override: "10053000001400000000"
      callsign_override: Suspect Boat 2

    # ========================================
    # PHASE 2: RESPONSE ORDERS
    # ========================================

    - id: aras_protocol
      after: "ssas_alert + 00:02"
      type: ALERT
      description: MMEA activates ARAS response protocol.
      on_initiate: >
        MMEA ARAS response protocol activated. All agencies notified.
        Radio silence imposed — no open VHF.
      alert_agencies: [MMEA, MIL, RMP]

    - id: heli_scramble
      after: "ssas_alert + 00:03"
      type: ORDER
      description: Scramble helicopter for FLIR overwatch.
      on_initiate: >
        TUDM Caracal 1 scrambled from RMAF Subang. FLIR and night
        observation priority — covert overwatch.
      target: RMAF-HELI-001
      action: transit
      destination: {lat: 3.416, lon: 100.490}
      speed: 150
      altitude_m: 150
      alert_agencies: [MMEA, MIL, RMP]
      on_complete: >
        TUDM Caracal 1 on scene. FLIR confirms MT Labuan Palm
        stationary. Two fast boats alongside. 10-12 armed persons.
      on_complete_action: orbit
      orbit_center: TANKER-001
      orbit_radius_nm: 1.0
      orbit_speed: 40

    - id: perantau_order
      after: "ssas_alert + 00:05"
      type: ORDER
      description: KM Perantau ordered to tanker with UTK embarked.
      on_initiate: >
        KM Perantau ordered to proceed at best speed. UTK Team Alpha
        (12 operators) embarked — boarding team activated.
      target: MMEA-PV-001
      action: transit
      destination: {lat: 3.416, lon: 100.490}
      speed: 22
      alert_agencies: [MMEA, MIL, RMP]
      on_complete: >
        KM Perantau alongside MT Labuan Palm. UTK preparing RHIB.
      on_complete_action: hold_station
      hold_target: TANKER-001

    - id: perak_order
      after: "ssas_alert + 00:07"
      type: ORDER
      description: KD Perak ordered to blocking position SW.
      on_initiate: >
        KD Perak ordered to blocking position 3.35N 100.45E. Cut off
        pirate escape toward Indonesian EEZ and Riau Islands.
      target: RMN-OPV-001
      action: transit
      destination: {lat: 3.350, lon: 100.450}
      speed: 22
      alert_agencies: [MMEA, MIL]
      on_complete: >
        KD Perak in blocking position. All SW escape routes covered.
      on_complete_action: hold_station

    # Tanker stops
    - id: tanker_stop
      after: "ssas_alert + 00:10"
      type: ALERT
      description: Tanker dead in water — hostage situation.
      on_initiate: >
        MT Labuan Palm dead in water at 3.416N 100.490E. Hostage
        situation assessed HIGH RISK. Crew of 28.
      target: TANKER-001
      action: hold_station
      alert_agencies: [MMEA, MIL, RMP]
      severity: CRITICAL

    # Pirate 2 begins lookout orbit when it arrives at tanker
    - id: pirate2_orbit
      after: "pirate2_sprint:complete"
      type: DETECTION
      description: Pirate lookout boat begins sentry orbit.
      target: PIRATE-002
      action: orbit
      orbit_center: TANKER-001
      orbit_radius_nm: 0.18
      orbit_speed: 4

    # ========================================
    # PHASE 3: ON SCENE
    # (Helicopter arrival auto-generated via on_complete)
    # ========================================

    - id: flir_update
      after: "heli_scramble:complete + 00:05"
      type: ALERT
      description: FLIR intelligence update from helicopter.
      on_initiate: >
        TUDM Caracal 1 FLIR: perpetrators between bridge and crew
        accommodation. Master under guard. No weapons discharge.
      source: RMAF-HELI-001
      alert_agencies: [MMEA, RMP]
      severity: WARNING

    - id: utk_briefing
      after: "heli_scramble:complete + 00:10"
      type: ALERT
      description: UTK briefed on FLIR intelligence.
      on_initiate: >
        UTK Team Alpha briefed — 10-12 perpetrators, crew mustered.
        PDRM Crisis Negotiation Team activated.
      alert_agencies: [MMEA, RMP]

    - id: illuminate
      after: "heli_scramble:complete + 00:13"
      type: ALERT
      description: Helicopter illuminates tanker, demands surrender.
      on_initiate: >
        MMEA IC authorises illuminate. TUDM Caracal 1 searchlight and
        loudhailer: "This is MMEA. You are surrounded. Surrender."
      alert_agencies: [MMEA, MIL, RMP]
      severity: WARNING

    # ========================================
    # PHASE 4: ESCALATION & ESCAPE
    # ========================================

    - id: pirates_fire_flares
      after: "illuminate + 00:05"
      type: ALERT
      description: Pirates fire flares — no weapons discharge.
      on_initiate: >
        Pirates fire flares at helicopter — no weapons discharge.
        KD Perak in blocking position. UTK preparing RHIB.
      alert_agencies: [MMEA, MIL, RMP]
      severity: WARNING

    - id: pirate2_escape
      after: "pirates_fire_flares + 00:01"
      type: ALERT
      description: Fast Boat 2 breaks away heading SSW.
      on_initiate: >
        Fast Boat 2 breaking away — heading 215 at 28 knots toward
        Indonesian waters.
      target: PIRATE-002
      action: escape
      bearing_deg: 215
      speed: 28
      sidc_override: "10063000001400000000"
      callsign_override: Hostile Boat 2
      alert_agencies: [MMEA, MIL, RMP]
      severity: CRITICAL

    - id: pirate1_escape
      after: "pirate2_escape + 00:02"
      type: ALERT
      description: Fast Boat 1 breaks away heading SSW.
      on_initiate: >
        Fast Boat 1 breaking away — heading 210 at 28 knots. Both
        vessels fleeing toward Indonesian EEZ.
      target: PIRATE-001
      action: escape
      bearing_deg: 210
      speed: 28
      sidc_override: "10063000001400000000"
      callsign_override: Hostile Boat 1
      alert_agencies: [MMEA, MIL, RMP]
      severity: CRITICAL

    - id: heli_pursue
      after: "pirate1_escape + 00:01"
      type: ORDER
      description: Helicopter pursues fleeing pirates.
      on_initiate: >
        TUDM Caracal 1 breaking orbit — pursuing fleeing fast boats.
      target: RMAF-HELI-001
      action: intercept
      intercept_target: PIRATE-001
      alert_agencies: [MMEA, MIL]

    # ========================================
    # PHASE 5: BOARDING & RESOLUTION
    # ========================================

    - id: utk_board
      after: "perantau_order:complete + 00:05"
      type: BOARDING
      description: UTK boards tanker via RHIB insertion.
      on_initiate: >
        UTK Team Alpha RHIB alongside MT Labuan Palm. Fast-rope ascent
        — two teams, port and starboard. Breaching bridge.
      target: RMP-UTK-001
      action: disembark
      boarding_target: TANKER-001
      alert_agencies: [MMEA, MIL, RMP]
      severity: CRITICAL

    - id: bridge_secure
      after: "utk_board + 00:02"
      type: ALERT
      description: Bridge secure — perpetrators detained.
      on_initiate: >
        UTK Team Alpha: BRIDGE SECURE. 4 perpetrators detained, weapons
        secured. Crew of 28 safe. No UTK casualties.
      alert_agencies: [MMEA, MIL, RMP]

    - id: perak_intercept
      after: "pirate1_escape + 00:08"
      type: ORDER
      description: KD Perak intercepts fleeing fast boats.
      on_initiate: >
        KD Perak intercepting. TUDM Caracal 1 overhead illuminating.
      target: RMN-OPV-001
      action: intercept
      intercept_target: PIRATE-001
      alert_agencies: [MMEA, MIL]
      on_complete: >
        KD Perak alongside both fast boats. 11 perpetrators detained.
        All weapons secured.
      on_complete_action: hold_station

    - id: endstate
      after: "bridge_secure + 00:10"
      type: RESOLUTION
      description: Scenario complete.
      on_initiate: >
        ENDSTATE — MT Labuan Palm secured. 15 perpetrators in custody.
        Crew of 28 safe. Multi-agency ARAS response successful.
      alert_agencies: [MMEA, MIL, RMP]
