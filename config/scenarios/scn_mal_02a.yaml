# SCN-MAL-02A: Tanker Armed Robbery — Reactive Chain
# Schema reference: docs/scenario-schema.md
# Version: 2.0
# Schema: v2 (action-based reactive chains)
# Created: 2026-04-17
# Author: BrumbieSoft
#
# Changelog:
#   v2.0 (2026-04-17) — Complete rewrite to action-based reactive chains.
#     Zero waypoints. embarked_on for UTK boarding team. SIDC identity
#     escalation via events (Unknown → Suspect → Hostile). All response
#     orders chain from confirmed boarding (pirates_aboard event).
#   v1.0 (2026-04-09) — Original waypoint-based scenario (scn_mal_02.yaml)

scenario:
  name: "SCN-MAL-02A: Tanker Armed Robbery — Reactive Chain"
  description: >
    Malaysian-flag VLCC transiting southern Strait of Malacca activates
    SSAS during night boarding. Multi-agency response using reactive
    event chains — zero waypoints, all action-driven.
  duration_minutes: 75
  center: {lat: 3.41, lon: 100.49}
  zoom: 9
  background:
    include:
      - ais_background_malacca.yaml

  scenario_entities:

    - id: TANKER-001
      type: CIVILIAN_TANKER
      callsign: MT Labuan Palm
      initial_position:
        lat: 3.392
        lon: 100.514
        speed_kn: 14
        heading_deg: 315
      metadata:
        ais_active: true
        mmsi: '533000777'
        flag: MYS
        vessel_type: VLCC Crude Tanker
        length_m: 300
        estimated_crew: 28
        cargo: Crude oil

    - id: PIRATE-001
      type: SUSPECT_VESSEL
      callsign: Unknown Boat 1
      sidc: "10013000001400000000"
      initial_position:
        lat: 3.389
        lon: 100.491
        speed_kn: 3
        heading_deg: 45
      metadata:
        ais_active: false
        vessel_type: Fast fibreglass boat ~10m
        armed: true
        estimated_crew: 6

    - id: PIRATE-002
      type: SUSPECT_VESSEL
      callsign: Unknown Boat 2
      sidc: "10013000001400000000"
      initial_position:
        lat: 3.392
        lon: 100.484
        speed_kn: 3
        heading_deg: 30
      metadata:
        ais_active: false
        vessel_type: Fast fibreglass boat ~10m
        armed: true
        estimated_crew: 5

    # Boarding party riding PIRATE-001. Hidden until `pirate_crew1_board`
    # fires — then they appear on the tanker with a HOSTILE_PERSONNEL symbol.
    - id: PIRATE-CREW-001
      type: HOSTILE_PERSONNEL
      callsign: Pirate Boarding Party
      embarked_on: PIRATE-001
      initial_position:
        lat: 3.389
        lon: 100.491
      metadata:
        personnel_count: 4
        weapons: small_arms

    - id: MMEA-PV-001
      type: MMEA_PATROL
      callsign: KM Perantau
      agency: MMEA
      initial_position:
        lat: 3.220
        lon: 100.680
        speed_kn: 12
        heading_deg: 300
      metadata:
        mmsi: '533100200'
        flag: MYS
        vessel_type: MMEA 60m Patrol Vessel

    - id: RMP-UTK-001
      type: RMP_TACTICAL_TEAM
      callsign: UTK Team Alpha
      agency: RMP
      embarked_on: MMEA-PV-001
      initial_position:
        lat: 3.220
        lon: 100.680
      metadata:
        unit_name: UTK Team Alpha
        personnel_count: 12

    - id: RMN-OPV-001
      type: MIL_NAVAL
      callsign: KD Perak
      agency: MIL
      initial_position:
        lat: 3.150
        lon: 100.540
        speed_kn: 10
        heading_deg: 320
      metadata:
        mmsi: '533300173'
        flag: MYS
        vessel_type: Kedah-class OPV

    - id: RMAF-HELI-001
      type: RMAF_HELICOPTER
      callsign: TUDM Caracal 1
      agency: RMAF
      initial_position:
        lat: 3.131
        lon: 101.549
        speed_kn: 0
        heading_deg: 0
      metadata:
        aircraft_type: Airbus H225M Caracal
        home_base: {lat: 3.131, lon: 101.549}

  events:

    # ========================================
    # PHASE 1: DETECTION & ALERT & BOARDING
    # ========================================

    - id: tanker_tracking
      time: "00:00"
      type: DETECTION
      description: Normal AIS tracking of MT Labuan Palm.
      on_initiate: >
        MRCC Lumut: MT Labuan Palm (MMSI 533000777) tracking normally.
        14 knots, heading 315 NW through southern Strait of Malacca.
      position: {lat: 3.392, lon: 100.514}
      alert_agencies: [MMEA]

    # Pirates accelerate toward tanker first — captain sees intent
    # Pirates accelerate toward tanker — still Unknown identity
    - id: pirate1_sprint
      time: "00:05"
      type: DETECTION
      description: Unknown boat 1 accelerates toward tanker.
      on_initiate: >
        Unknown fast boat accelerating on intercept course toward
        MT Labuan Palm. Speed 25 knots, closing rapidly.
      actionee: PIRATE-001
      action: intercept
      target: TANKER-001
      speed: 25
      on_complete_action: alongside

    - id: pirate2_sprint
      time: "00:05"
      type: DETECTION
      description: Unknown boat 2 accelerates toward tanker.
      actionee: PIRATE-002
      action: intercept
      target: TANKER-001
      speed: 25
      on_complete_action: orbit
      orbit_center: TANKER-001
      orbit_radius_nm: 0.18
      orbit_speed: 4
      orbit_direction: CCW

    # Captain sees fast boats and activates SSAS 30 seconds later
    - id: ssas_alert
      after: {event: pirate1_sprint, phase: initiate, offset: "00:00:30"}
      type: DISTRESS
      description: Master sees fast boats closing and covertly activates SSAS.
      on_initiate: >
        SSAS COVERT ALERT — MT Labuan Palm. Master has activated Ship
        Security Alert System. Two fast boats approaching at high speed
        from the Indonesian side. No boarding yet.
      actionee: TANKER-001
      alert_agencies: [MMEA, MIL, RMP]
      severity: CRITICAL

    # MMEA assesses boats as Suspect 30 seconds after receiving SSAS
    - id: pirates_suspect
      after: {event: ssas_alert, phase: initiate, offset: "00:00:30"}
      type: ALERT
      description: MMEA classifies approaching boats as Suspect.
      on_initiate: >
        MMEA assessment: two fast boats on intercept course classified
        SUSPECT. Speed and bearing consistent with piracy approach.
      actionee: PIRATE-001
      sidc_override: "10053000001400000000"
      callsign_override: Suspect Boat 1
      alert_agencies: [MMEA]
      severity: WARNING

    - id: pirate2_suspect
      after: {event: ssas_alert, phase: initiate, offset: "00:00:30"}
      type: ALERT
      description: Second boat also classified Suspect.
      actionee: PIRATE-002
      sidc_override: "10053000001400000000"
      callsign_override: Suspect Boat 2

    - id: pirates_aboard
      after: {event: pirate1_sprint, phase: complete, offset: "00:00:30"}
      type: DISTRESS
      description: Pirates aboard — second SSAS pulse. Tanker forced to stop.
      on_initiate: >
        SSAS SECONDARY PULSE — MT Labuan Palm. Pirates aboard. Armed
        perpetrators on bridge — master forced to stop engines. Crew
        of 28 — hostage situation confirmed.
      actionee: TANKER-001
      action: hold_station
      alert_agencies: [MMEA, MIL, RMP]
      severity: CRITICAL

    # Escalate pirate identity to HOSTILE on confirmed boarding
    - id: pirate1_hostile
      after: {event: pirates_aboard}
      type: ALERT
      description: Pirates confirmed hostile — armed boarding in progress.
      on_initiate: >
        Intelligence assessment: armed perpetrators classified HOSTILE.
        Weapons confirmed. Rules of engagement updated.
      actionee: PIRATE-001
      sidc_override: "10063000001400000000"
      callsign_override: Hostile Boat 1
      alert_agencies: [MMEA, MIL, RMP]
      severity: WARNING

    - id: pirate2_hostile
      after: {event: pirates_aboard}
      type: ALERT
      description: Pirate 2 escalated to hostile.
      actionee: PIRATE-002
      sidc_override: "10063000001400000000"
      callsign_override: Hostile Boat 2

    # Boarding party disembarks from pirate skiff onto the tanker. The
    # HOSTILE_PERSONNEL entity has been riding PIRATE-001 (hidden). After
    # PIRATE-001 is alongside, the crew moves to the tanker and thereafter
    # rides it — a hostile-personnel symbol appears on MT Labuan Palm.
    - id: pirate_crew1_board
      after: {event: pirates_aboard}
      type: BOARDING
      description: Pirate boarding party now on the tanker.
      on_initiate: >
        Pirate boarding party disembarks from Hostile Boat 1 onto
        MT Labuan Palm. Four armed perpetrators on deck.
      actionee: PIRATE-CREW-001
      action: disembark
      onto: TANKER-001
      alert_agencies: [MMEA, MIL, RMP]
      severity: CRITICAL

    # ========================================
    # PHASE 2: MULTI-AGENCY RESPONSE
    # (All triggered by confirmed boarding)
    # ========================================

    - id: aras_protocol
      after: {event: pirates_aboard}
      type: ALERT
      description: Confirmed boarding — MMEA activates full ARAS response.
      on_initiate: >
        MMEA ARAS response protocol activated. Confirmed armed boarding
        in progress. All agencies notified. Radio silence imposed.
      alert_agencies: [MMEA, MIL, RMP]

    - id: heli_scramble
      after: {event: pirates_aboard, phase: initiate, offset: "00:02:00"}
      type: ORDER
      description: Scramble helicopter — confirmed hostage situation.
      on_initiate: >
        TUDM Caracal 1 scrambled from RMAF Subang. Confirmed armed
        boarding — FLIR and night observation priority.
      actionee: RMAF-HELI-001
      action: intercept
      target: TANKER-001
      speed: 150
      altitude_m: 150
      intercept_radius_nm: 1.0       # closes to orbit radius, then hands off
      alert_agencies: [MMEA, MIL, RMP]
      on_complete: >
        TUDM Caracal 1 on scene. FLIR confirms tanker stationary.
        Two fast boats — one alongside, one circling. 10-12 armed
        persons visible.
      on_complete_action: orbit
      orbit_center: TANKER-001
      orbit_radius_nm: 1.0
      orbit_speed: 40

    - id: perantau_order
      after: {event: pirates_aboard, phase: initiate, offset: "00:03:00"}
      type: ORDER
      description: KM Perantau ordered to tanker with UTK boarding team.
      on_initiate: >
        KM Perantau ordered to proceed at best speed. UTK Team Alpha
        (12 operators) embarked — counter-terrorism boarding team
        activated.
      actionee: MMEA-PV-001
      action: approach
      approach_target: TANKER-001
      speed: 22
      final_speed: 2
      approach_distance_nm: 1.5
      alert_agencies: [MMEA, MIL, RMP]
      on_complete: >
        KM Perantau alongside MT Labuan Palm. UTK preparing RHIB.
      on_complete_action: hold_station
      hold_target: TANKER-001

    - id: perak_order
      after: {event: pirates_aboard, phase: initiate, offset: "00:01:00"}
      type: ORDER
      description: KD Perak ordered to blocking position SW.
      on_initiate: >
        KD Perak ordered to blocking position 3.35N 100.45E. Cut off
        pirate escape toward Indonesian EEZ.
      actionee: RMN-OPV-001
      action: transit
      destination: {lat: 3.350, lon: 100.450}
      speed: 22
      alert_agencies: [MMEA, MIL]
      on_complete: >
        KD Perak in blocking position. All SW escape routes covered.
      on_complete_action: hold_station

    # ========================================
    # PHASE 3: HELICOPTER ON SCENE
    # (Arrival auto-generated via heli_scramble on_complete)
    # ========================================

    - id: flir_update
      after: {event: heli_scramble, phase: complete, offset: "00:00:30"}
      type: ALERT
      description: FLIR intelligence update from helicopter.
      on_initiate: >
        TUDM Caracal 1 FLIR: perpetrators between bridge and crew
        accommodation. Master under guard. No weapons discharge.
      source: RMAF-HELI-001
      alert_agencies: [MMEA, RMP]
      severity: WARNING

    - id: utk_briefing
      after: {event: heli_scramble, phase: complete, offset: "00:10:00"}
      type: ALERT
      description: UTK briefed on FLIR intelligence.
      on_initiate: >
        UTK Team Alpha briefed — 10-12 perpetrators, crew mustered.
        PDRM Crisis Negotiation Team activated.
      alert_agencies: [MMEA, RMP]

    - id: illuminate
      after: {event: perantau_order, phase: complete, offset: "00:00:10"}
      type: ALERT
      description: Helicopter illuminates tanker, demands surrender.
      on_initiate: >
        MMEA IC authorises illuminate. TUDM Caracal 1 searchlight and
        loudhailer: "This is MMEA. You are surrounded. Surrender."
      alert_agencies: [MMEA, MIL, RMP]
      severity: WARNING

    # ========================================
    # PHASE 4: ESCALATION & ESCAPE
    # ========================================

    - id: pirates_fire_flares
      after: {event: perantau_order, phase: complete}
      type: ALERT
      description: Pirates fire flares — no weapons discharge.
      on_initiate: >
        Pirates fire flares at helicopter — no weapons discharge.
        KD Perak in blocking position. UTK preparing RHIB.
      alert_agencies: [MMEA, MIL, RMP]
      severity: WARNING

    - id: pirate2_escape
      after: {event: perantau_order, phase: complete, offset: "00:00:05"}
      type: ALERT
      description: Fast Boat 2 breaks away heading SSW.
      on_initiate: >
        Fast Boat 2 breaking away — heading 215 at 28 knots toward
        Indonesian waters.
      actionee: PIRATE-002
      action: escape
      bearing_deg: 215
      speed: 28
      alert_agencies: [MMEA, MIL, RMP]
      severity: CRITICAL

    - id: pirate1_escape
      after: {event: perantau_order, phase: complete}
      type: ALERT
      description: Fast Boat 1 breaks away heading SSW.
      on_initiate: >
        Fast Boat 1 breaking away — heading 210 at 28 knots. Both
        vessels fleeing toward Indonesian EEZ.
      actionee: PIRATE-001
      action: escape
      bearing_deg: 210
      speed: 28
      alert_agencies: [MMEA, MIL, RMP]
      severity: CRITICAL

    - id: heli_pursue
      after: {event: pirate1_escape, phase: initiate, offset: "00:00:10"}
      type: ORDER
      description: Helicopter pursues fleeing pirates.
      on_initiate: >
        TUDM Caracal 1 breaking orbit — pursuing fleeing fast boats.
      actionee: RMAF-HELI-001
      action: intercept
      target: PIRATE-001
      alert_agencies: [MMEA, MIL]

    # ========================================
    # PHASE 5: BOARDING & RESOLUTION
    # ========================================

    - id: utk_board
      after: {event: perantau_order, phase: complete, offset: "00:02:00"}
      type: BOARDING
      description: UTK boards tanker via RHIB insertion.
      on_initiate: >
        UTK Team Alpha RHIB alongside MT Labuan Palm. Fast-rope ascent
        — two teams, port and starboard. Breaching bridge.
      actionee: RMP-UTK-001
      action: disembark
      boarding_target: TANKER-001
      alert_agencies: [MMEA, MIL, RMP]
      severity: CRITICAL

    - id: bridge_secure
      after: {event: utk_board, phase: initiate, offset: "00:05:00"}
      type: ALERT
      description: Bridge secure — perpetrators detained.
      on_initiate: >
        UTK Team Alpha: BRIDGE SECURE. 4 perpetrators detained, weapons
        secured. Crew of 28 safe. No UTK casualties.
      alert_agencies: [MMEA, MIL, RMP]

    - id: perak_intercept
      after: {event: pirate2_escape, phase: initiate, offset: "00:00:30"}
      type: ORDER
      description: KD Perak intercepts fleeing fast boats.
      on_initiate: >
        KD Perak intercepting. TUDM Caracal 1 overhead illuminating.
      actionee: RMN-OPV-001
      action: intercept
      target: PIRATE-002
      alert_agencies: [MMEA, MIL]
      on_complete: >
        KD Perak alongside both fast boats. 11 perpetrators detained.
        All weapons secured.
      on_complete_action: hold_station

    # Pirates forced to stop when KD Perak intercepts
    - id: pirate1_detained
      after: {event: perak_intercept, phase: complete}
      type: ALERT
      description: Pirate 1 stopped and detained by KD Perak.
      actionee: PIRATE-001
      action: hold_station

    - id: pirate2_detained
      after: {event: perak_intercept, phase: complete}
      type: ALERT
      description: Pirate 2 stopped and detained by KD Perak.
      actionee: PIRATE-002
      action: hold_station

    - id: endstate
      after: {event: perak_intercept, phase: complete, offset: "00:02:00"}
      type: RESOLUTION
      description: Scenario complete.
      on_initiate: >
        ENDSTATE — MT Labuan Palm secured. 15 perpetrators in custody.
        Crew of 28 safe. Multi-agency ARAS response successful.
      alert_agencies: [MMEA, MIL, RMP]
