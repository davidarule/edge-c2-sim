scenario:
  name: 'SCN-MAL-02: Tanker Armed Robbery at Sea — Strait of Malacca'
  description: >
    A Malaysian-flag VLCC crude tanker transiting the southern Strait of Malacca
    activates its Ship Security Alert System (SSAS) covertly during a night
    transit. Two armed fast boats approach from the Indonesian side and armed
    perpetrators board. The Master activates SSAS from the bridge without
    alerting the attackers.

    MMEA Maritime Rescue Coordination Centre receives the covert alert and
    activates a multi-agency response. An RMAF EC725 helicopter scrambles
    from Subang for immediate airborne overwatch. MMEA dispatches its nearest
    patrol vessel. RMN provides a southern blocking position to cut off pirate
    escape routes toward Indonesian waters. RMP UTK (counter-terrorism unit)
    deploys as the tactical boarding team.

    The scenario includes a hostage negotiation phase before UTK insertion,
    and concludes with tactical boarding, crew rescue, and pirate detention.

    Demonstrates: SSAS distress alert workflow, night maritime operations,
    helicopter overwatch and FLIR targeting, RMP counter-terrorism boarding,
    multi-agency joint operations, pirate pursuit and interdiction.
  duration_minutes: 75
  center:
    lat: 3.41
    lon: 100.49
  zoom: 9
  include_entities:
  - ais_background_malacca.yaml
  background_entities: []

  # ==============================================================
  # SCENARIO PHYSICS SUMMARY
  # ==============================================================
  # Incident point (tanker dead in water): 3.416°N, 100.490°E
  # Pirate escape convergence:             3.350°N, 100.448°E
  # KD Perak blocking position:            3.350°N, 100.450°E
  #
  # KEY TIMINGS:
  #   T+00  Scenario start — tanker transiting NW at 14kn
  #   T+05  SSAS triggered — pirates boarding
  #   T+10  Airborne: helicopter. Orders: KM Perantau, UTK
  #   T+14  KD Perak sprints to blocking position
  #   T+15  Tanker dead in water
  #   T+36  Helicopter on scene (26min transit from Subang)
  #   T+49  KD Perak in blocking position
  #   T+50  Helicopter illuminates tanker
  #   T+55  KM Perantau approaching tanker
  #   T+58  PIRATE-002 flees (heading 215°)
  #   T+60  PIRATE-001 flees (heading 210°)
  #   T+63  UTK boards tanker via RHIB
  #   T+66  KD Perak intercepts fleeing pirates
  #   T+70  Bridge secure, all perpetrators detained
  #   T+75  Endstate
  # ==============================================================

