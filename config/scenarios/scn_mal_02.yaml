scenario:
  name: 'SCN-MAL-02: Tanker Armed Robbery at Sea — Strait of Malacca'
  description: 'A Malaysian-flag VLCC crude tanker transiting the southern Strait
    of

    Malacca activates its Ship Security Alert System (SSAS) covertly during

    a night transit. Two armed fast boats have approached from the Indonesian

    side and armed perpetrators have boarded. The Master activates SSAS from

    the bridge without alerting the attackers.


    MMEA Maritime Rescue Coordination Centre receives the covert alert and

    activates a multi-agency response. An RMAF EC725 helicopter scrambles

    from Subang for immediate airborne overwatch. MMEA dispatches its nearest

    patrol vessel. RMN provides a southern blocking position to cut off pirate

    escape routes toward Indonesian waters. RMP UTK (counter-terrorism unit)

    deploys as the tactical boarding team.


    The scenario includes a hostage negotiation phase before UTK insertion,

    and concludes with tactical boarding, crew rescue, and pirate detention.


    Demonstrates: SSAS distress alert workflow, night maritime operations,

    helicopter overwatch and FLIR targeting, RMP counter-terrorism boarding,

    multi-agency joint operations, pirate pursuit and interdiction.

    '
