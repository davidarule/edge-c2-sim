  # ==============================================================
  # EVENTS TIMELINE
  # ==============================================================
  events:
  - time: "00:00"
    type: DETECTION
    description: >
      MRCC Lumut: MT Labuan Palm (MMSI 533000777) tracking normally on AIS.
      Position 3.392°N 100.514°E, speed 14 knots, heading 315° NW. VLCC,
      300m, crude oil cargo. Malaysian flag. Normal traffic — night transit
      through southern Malacca TSS.
    position:
      lat: 3.392
      lon: 100.514
    alert_agencies:
    - MMEA
    severity: INFO

  - time: "00:05"
    type: DISTRESS
    description: >
      SSAS ALERT — COVERT DISTRESS. MT Labuan Palm Ship Security Alert
      System activated. Signal received at MRCC Lumut and forwarded to
      Malaysian Maritime Enforcement Agency. SSAS activation is silent —
      no audible alarm on vessel. Master has indicated armed boarding in
      progress without alerting attackers. Two fast boats sighted
      approaching from Indonesian side.
    target: TANKER-001
    position:
      lat: 3.406
      lon: 100.501
    alert_agencies:
    - MMEA
    - MIL
    - RMP
    severity: CRITICAL

  - time: "00:07"
    type: ALERT
    description: >
      MMEA Director of Operations activates Armed Robbery at Sea (ARAS)
      response protocol. All agencies notified on secure channel. Vessel
      position confirmed — 3.41°N 100.50°E, continuing NW but speed
      dropping. Pirates estimated to be boarding now. Radio silence
      imposed — no open VHF contact with MT Labuan Palm to avoid
      alerting attackers.
    alert_agencies:
    - MMEA
    - MIL
    - RMP
    - CI
    severity: CRITICAL

  - time: "00:08"
    type: ORDER
    description: >
      MMEA requests immediate RMAF helicopter support. TUDM Caracal 1
      (EC725) scrambled from RMAF Subang. ETA on scene 26 minutes.
      FLIR and night observation priority — covert overwatch, do NOT
      illuminate until ordered.
    target: RMAF-HELI-001
    action: deploy
    destination:
      lat: 3.416
      lon: 100.490

  - time: "00:10"
    type: ORDER
    description: >
      MMEA KM Perantau ordered to proceed at best speed to tanker
      position. RMP UTK Team Alpha (12 operators) embarked on KM
      Perantau — counter-terrorism boarding team activated. KM Perantau
      position 3.22°N 100.68°E, distance 15.7nm, ETA on scene 45 minutes.
    targets:
    - MMEA-PV-001
    - RMP-UTK-001
    action: intercept
    intercept_target: TANKER-001

  - time: "00:12"
    type: ORDER
    description: >
      MMEA notifies RMN. KD Perak (173) ordered to establish blocking
      position to the SW at 3.35°N 100.45°E — cut off pirate escape
      route toward Indonesian EEZ and Riau Islands. KD Perak currently
      on patrol at 3.15°N 100.54°E, distance 12.7nm, ETA blocking
      position 35 minutes.
    target: RMN-OPV-001
    action: deploy
    destination:
      lat: 3.350
      lon: 100.450

  - time: "00:15"
    type: ALERT
    description: >
      SSAS secondary pulse received. MT Labuan Palm now stationary at
      3.416°N 100.490°E — dead in water. Maritime Intelligence assessment:
      incident consistent with Strait of Malacca ARAS profile — two fast
      boats, 8-12 armed perpetrators, approach from Riau Islands direction.
      Crew of 28 — hostage situation assessed HIGH RISK. Night operation
      adds complexity.
    position:
      lat: 3.416
      lon: 100.490
    alert_agencies:
    - MMEA
    - MIL
    - RMP
    severity: CRITICAL

  - time: "00:37"
    type: DETECTION
    description: >
      TUDM Caracal 1 on scene. FLIR confirms: MT Labuan Palm stationary,
      position 3.416°N 100.490°E. Two small fast boats — one alongside
      port quarter, one circling at low speed. Crew activity on foredeck —
      crew mustered by armed individuals. Perpetrator count: estimated
      10-12 armed persons. Helicopter maintaining 500ft, covert
      observation — no searchlight. FLIR imagery transmitting to MMEA MRCC.
    source: RMAF-HELI-001
    position:
      lat: 3.416
      lon: 100.490
    alert_agencies:
    - MMEA
    - MIL
    - RMP
    severity: CRITICAL

  - time: "00:42"
    type: ALERT
    description: >
      RMAF Caracal 1: FLIR update — perpetrators moving between bridge
      and crew accommodation. Master and chief officer appear to be on
      bridge under guard. No visible weapons discharge. Crew appears
      compliant — no casualties visible at this stage. One perpetrator
      on each fast boat maintaining lookout.
    source: RMAF-HELI-001
    alert_agencies:
    - MMEA
    - RMP
    severity: WARNING

  - time: "00:48"
    type: ALERT
    description: >
      MMEA MRCC Incident Command: KM Perantau ETA 10 minutes. UTK Team
      Alpha briefed on FLIR intelligence — 10-12 perpetrators, crew
      mustered foredeck, two boats alongside. UTK commander assessing
      insertion options: RHIB approach from KM Perantau alongside.
      PDRM Crisis Negotiation Team activated, standing by via satellite
      phone.
    alert_agencies:
    - MMEA
    - RMP
    severity: INFO

  - time: "00:50"
    type: ALERT
    description: >
      MMEA Incident Commander authorises helicopter to illuminate. TUDM
      Caracal 1 activates searchlight and loudhailer. Announcement in
      Malay, English, and Indonesian: 'This is the Malaysian Maritime
      Enforcement Agency. You are surrounded. Release the crew and
      surrender your weapons.' Pirates observed reacting — movement on
      foredeck increasing.
    alert_agencies:
    - MMEA
    - MIL
    - RMP
    severity: WARNING

  - time: "00:55"
    type: ALERT
    description: >
      Pirates respond by firing flares — no weapons discharge at
      helicopter. KD Perak has reached blocking position 3.35°N 100.45°E
      — all SW escape routes covered. KM Perantau 3 minutes out. UTK
      Team Alpha preparing RHIB for insertion. PDRM Crisis Negotiator
      attempting satellite phone contact with Master — no response yet.
    source: RMN-OPV-001
    alert_agencies:
    - MMEA
    - MIL
    - RMP
    severity: WARNING

  - time: "00:58"
    type: ALERT
    description: >
      Fast Boat 2 breaking away from tanker — heading SW at high speed
      (28 knots, heading 215°). Lookout boat fleeing first. RMAF Caracal 1
      tracking with FLIR. KM Perantau arriving alongside tanker.
