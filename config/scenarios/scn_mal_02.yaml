  events:
  - time: 00:00
    type: DETECTION
    description: 'MRCC Lumut: MT Labuan Palm (MMSI 533000777) tracking normally on
      AIS. Position 3.48°N 100.96°E, speed 14 knots, heading 315° NW. VLCC, 300m,
      crude oil cargo. Malaysian flag. Normal traffic — night transit through southern
      Malacca TSS.'
    position:
      lat: 3.48
      lon: 101.24
    alert_agencies:
    - MMEA
    severity: INFO
  - time: 00:05
    type: DISTRESS
    description: SSAS ALERT — COVERT DISTRESS. MT Labuan Palm Ship Security Alert
      System activated. Signal received at MRCC Lumut and forwarded to Malaysian Maritime
      Enforcement Agency. SSAS activation is silent — no audible alarm on vessel.
      Master has indicated armed boarding in progress without alerting attackers.
      Two fast boats sighted approaching from Indonesian side.
    target: TANKER-001
    alert_agencies:
    - MMEA
    - MIL
    - RMP
    severity: CRITICAL
  - time: 00:07
    type: ALERT
    description: MMEA Director of Operations activates Armed Robbery at Sea (ARAS)
      response protocol. All agencies notified on secure channel. Vessel position
      confirmed — 3.53°N 100.91°E, continuing NW but speed dropping. Pirates estimated
      to be boarding now. Radio silence imposed — no open VHF contact with MT Labuan
      Palm to avoid alerting attackers.
    alert_agencies:
    - MMEA
    - MIL
    - RMP
    - CI
    severity: CRITICAL
  - time: 00:08
    type: ORDER
    description: MMEA requests immediate RMAF helicopter support. TUDM Caracal 1 (EC725)
      scrambled from RMAF Subang. ETA on scene 14 minutes. FLIR and night observation
      priority — covert overwatch, do NOT illuminate until ordered.
    target: RMAF-HELI-001
    action: deploy
    destination:
      lat: 3.565
      lon: 100.865
  - time: 00:10
    type: ORDER
    description: MMEA KM Perantau ordered to proceed at best speed to tanker position.
      RMP UTK Team Alpha (12 operators) embarked on KM Perantau — counter-terrorism
      boarding team activated. KM Perantau ETA on scene 61 minutes.
    targets:
    - MMEA-PV-001
    - RMP-UTK-001
    action: intercept
    intercept_target: TANKER-001
  - time: 00:12
    type: ORDER
    description: MMEA notifies RMN. KD Perak (173) ordered to establish blocking position
      to the SW — cut off pirate escape route toward Indonesian EEZ and Sumatran coast.
      KD Perak ETA blocking position 33 minutes.
    target: RMN-OPV-001
    action: deploy
    destination:
      lat: 3.35
      lon: 100.75
  - time: 00:15
    type: ALERT
    description: 'SSAS secondary pulse received. Maritime Intelligence assessment:
      incident consistent with Strait of Malacca ARAS profile — two fast boats, 8-12
      armed perpetrators, approach from Riau Islands direction. Pirates typically
      seek cash, valuables, and portable equipment. Crew of 28 — hostage situation
      assessed HIGH RISK. Night operation adds complexity.'
    alert_agencies:
    - MMEA
    - MIL
    - RMP
    severity: CRITICAL
  - time: 00:22
    type: DETECTION
    description: 'TUDM Caracal 1 on scene. FLIR confirms: MT Labuan Palm stationary,
      position 3.565°N 100.865°E. Two small fast boats alongside — one port quarter,
      one circling. Crew activity on foredeck — crew mustered by armed individuals.
      Perpetrator count: estimated 10-12 armed persons. Helicopter maintaining 500ft,
      covert observation — no searchlight. FLIR imagery transmitting to MMEA MRCC.'
    source: RMAF-HELI-001
    position:
      lat: 3.565
      lon: 100.865
    alert_agencies:
    - MMEA
    - MIL
    - RMP
    severity: CRITICAL
  - time: 00:28
    type: ALERT
    description: 'RMAF Caracal 1: FLIR update — perpetrators moving between bridge
      and crew accommodation. Master and chief officer appear to be on bridge under
      guard. No visible weapons discharge. Crew appears compliant — no casualties
      visible at this stage. One perpetrator on each fast boat maintaining lookout.'
    source: RMAF-HELI-001
    alert_agencies:
    - MMEA
    - RMP
    severity: WARNING
  - time: 00:35
    type: ALERT
    description: 'MMEA MRCC Incident Command: KM Perantau ETA 36 minutes. UTK Team
      Alpha briefed on FLIR intelligence — 10-12 perpetrators, crew mustered foredeck,
      two boats alongside. UTK commander assessing insertion options: RHIB approach,
      fast-rope from helicopter, or combined. Negotiation strategy under review —
      PDRM Crisis Negotiation Team activated, standing by via satellite phone.'
    alert_agencies:
    - MMEA
    - RMP
    severity: INFO
  - time: 00:45
    type: DETECTION
    description: 'RMAF Caracal 1: pirate activity increasing on bridge. FLIR shows
      possible radio equipment — perpetrators may be aware of response. Fast boat
      2 increasing speed — circling wider. Recommend Caracal illuminate in 10 minutes
      to assert presence and deter violence against crew.'
    source: RMAF-HELI-001
    alert_agencies:
    - MMEA
    - MIL
    - RMP
    severity: WARNING
  - time: 00:50
    type: ALERT
    description: 'MMEA Incident Commander authorises helicopter to illuminate. TUDM
      Caracal 1 activates searchlight and loudhailer. Announcement in Malay, English,
      and Indonesian: ''This is the Malaysian Maritime Enforcement Agency. You are
      surrounded. Release the crew and surrender your weapons.'' Pirates observed
      reacting — movement on foredeck increasing.'
    alert_agencies:
    - MMEA
    - MIL
    - RMP
    severity: WARNING
  - time: 00:47
    type: ALERT
    description: Pirates respond by firing flares — no weapons discharge at helicopter.
      KD Perak has reached blocking position 3.35°N 100.75°E — directly on the SW escape
      vector toward Riau Islands. KM Perantau 24 minutes out. UTK Team Alpha preparing RHIB for insertion.
      PDRM Crisis Negotiator attempting satellite phone contact with Master — no response
      yet.
    source: RMN-OPV-001
    alert_agencies:
    - MMEA
    - MIL
    - RMP
    severity: WARNING
  - time: 01:00
    type: ALERT
    description: Fast Boat 1 breaking away — heading SW at high speed. KD Perak has
      visual. RMAF Caracal 1 in pursuit. Fast Boat 2 following. Perpetrators on tanker
      now isolated — those remaining may be a reduced group. UTK insertion window
      opening — KM Perantau 11 minutes.
    alert_agencies:
    - MMEA
    - MIL
    - RMP
    severity: CRITICAL
  - time: 01:05
    type: DETECTION
    description: 'KD Perak: both fast boats bearing 235° heading directly toward my position
      at 28 knots. Holding blocking station 3.35°N 100.75°E. RMAF Caracal 1 overhead —
      illuminating with searchlight, loudhailer demands to stop. Fast boats 5nm out and
      closing. Riau Islands 40nm SW — escape route blocked.'
    source: RMN-OPV-001
    alert_agencies:
    - MMEA
    - MIL
    severity: WARNING
  - time: 01:10
    type: DETECTION
    description: 'KD Perak: fast boats slowing — apparent compliance. Helicopter overhead.
      Weapons visible but not raised. KD Perak preparing boarding party. Simultaneously:
      KM Perantau 1 minute from tanker. UTK Team Alpha deploying RHIB.'
    source: RMN-OPV-001
    alert_agencies:
    - MMEA
    - MIL
    - RMP
    severity: INFO
  - time: 01:12
    type: BOARDING
    description: 'UTK Team Alpha RHIB alongside MT Labuan Palm. Fast-rope ascent —
      two teams, port and starboard simultaneously. Helicopter providing overwatch.
      Remaining perpetrators on tanker: 4 persons on bridge. UTK securing crew muster
      point — foredeck clear. Breaching bridge now.'
    target: RMP-UTK-001
    boarding_target: TANKER-001
    severity: CRITICAL
  - time: 01:14
    type: ALERT
    description: 'UTK Team Alpha: BRIDGE SECURE. 4 perpetrators detained, weapons
      secured. Master and officers released unharmed. Crew of 28 accounted for — all
      alive. 3 crew with minor injuries (cuts, bruising). No UTK casualties. Vessel
      secure. KD Perak alongside fast boats — 11 perpetrators detained at sea. All
      suspects in custody.'
    alert_agencies:
    - MMEA
    - MIL
    - RMP
    severity: INFO
  - time: 01:15
    type: ALERT
    description: ENDSTATE — MT Labuan Palm secured. 15 perpetrators in custody (4
      from tanker, 11 from fast boats). Crew of 28 safe. Vessel proceeding to Port
      Klang under escort for investigation. RMP Marine Police en route for formal
      custody transfer. MRCC case file opened. Malaysian Customs and Immigration notified
      for crew welfare processing. Multi-agency ARAS response successful — SSAS to
      UTK boarding in 69 minutes.
    alert_agencies:
    - MMEA
    - MIL
    - RMP
    - CI
    severity: INFO
