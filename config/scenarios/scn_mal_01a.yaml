# SCN-MAL-01A: AIS Dark Target Intercept
# Schema reference: docs/scenario-schema.md
# Version: 2.0
# Schema: v2 (action-based reactive chains)
# Created: 2026-04-17
# Author: BrumbieSoft
#
# Changelog:
#   v2.0 (2026-04-17) — Complete rewrite to action-based reactive chains.
#     Zero waypoints. AIS loss detection triggers intercept chain.
#     Transit, approach, hold_station actions replace explicit waypoints.
#   v1.0 (2026-04-09) — Original waypoint-based scenario (scn_mal_01.yaml)

scenario:
  name: "SCN-MAL-01A: AIS Dark Target Intercept — Reactive Chain"
  description: >
    A cargo vessel transiting the Strait of Malacca TSS disables its AIS
    transponder, triggering an immediate multi-agency intercept. MMEA
    coordinates fast intercept craft, patrol vessel, RMAF MPA, and RMN
    blocking position. RMP Marine Police conduct boarding and discover
    cargo discrepancies. Vessel escorted to Port Klang.

    Demonstrates: AIS anomaly detection, dark target tracking, multi-agency
    coordination, air-sea coordination, law enforcement boarding.
  duration_minutes: 240
  start_time: 2026-04-15T14:00:00Z  # 22:00 MYT — night surveillance (AIS loss more notable at night)
  center: {lat: 3.355426, lon: 100.464362}  # MV Hai Long 7 initial position
  zoom: 9
  background:
    include:
      - ais_background_malacca.yaml

  scenario_entities:

    # MV Hai Long 7 — bulk carrier, will go dark at T+10
    # Starts as neutral AIS contact, reclassified to suspect after AIS loss
    - id: SUSPECT-001
      type: CIVILIAN_CARGO
      callsign: MV Hai Long 7
      initial_position:
        lat: 3.355426
        lon: 100.464362
        speed_kn: 12
        heading_deg: 315
      metadata:
        ais_active: true
        mmsi: "413000001"
        flag: CHN
        vessel_type: Bulk carrier
        draught_m: 8.2
        estimated_crew: 22
        cargo_declared: Steel coils
        destination_declared: Port Klang
        last_port: Guangzhou

    # KM Penggalang — MMEA Fast Intercept Craft, on patrol
    - id: MMEA-FI-001
      type: MMEA_FAST_INTERCEPT
      callsign: KM Penggalang
      agency: MMEA
      initial_position:
        lat: 4.236544
        lon: 100.615622
        speed_kn: 10
        heading_deg: 330
      metadata:
        vessel_type: 39m Fast Intercept Craft
        callsign_radio: MMEA PENGGALANG

    # KM Marlin — MMEA Patrol Vessel, on TSS patrol
    - id: MMEA-PV-001
      type: MMEA_PATROL
      callsign: KM Marlin
      agency: MMEA
      initial_position:
        lat: 4.237150
        lon: 100.615148
        speed_kn: 12
        heading_deg: 240
      metadata:
        vessel_type: Offshore Patrol Vessel
        callsign_radio: MMEA MARLIN

    # KD Keris — RMN OPV on patrol, joins pursuit
    - id: RMN-PV-001
      type: MIL_NAVAL
      callsign: KD Keris
      agency: MIL
      initial_position:
        lat: 2.9
        lon: 100.7
        speed_kn: 10
        heading_deg: 330
      metadata:
        vessel_type: Offshore Patrol Vessel

    # TUDM Peregrine 1 — RMAF MPA, standby at Subang
    - id: RMAF-MPA-001
      type: RMAF_MPA
      callsign: TUDM Peregrine 1
      agency: RMAF
      initial_position:
        lat: 3.12
        lon: 101.65
        speed_kn: 0
        heading_deg: 0
      metadata:
        aircraft_type: Beechcraft Super King Air
        home_base: {lat: 3.12, lon: 101.65}
        sensors: [FLIR, SAR, AIS_receiver]

    # PDRM Marine Klang 01 — RMP boarding team, standby at Port Klang
    - id: RMP-MP-001
      type: RMP_MARINE_PATROL
      callsign: PDRM Marine Klang 01
      agency: RMP
      initial_position:
        lat: 3.06
        lon: 101.16
        speed_kn: 0
        heading_deg: 0
      metadata:
        vessel_type: RHIB
        unit_size: 8
        equipment: [boarding_kit, M4_rifle, body_armor]
        callsign_radio: PDRM MARINE KLANG

  events:

    # ========================================
    # PHASE 1: NORMAL TRACKING & AIS LOSS
    # ========================================

    - id: initial_tracking
      time: "00:00"
      type: DETECTION
      description: Normal AIS tracking of bulk carrier.
      on_initiate: >
        MMEA Lumut: MV Hai Long 7 tracked on AIS transiting NW through
        Malacca TSS. Speed 12 knots. Chinese flag, bulk carrier.
        Standard commercial traffic.
      position: {lat: 3.355426, lon: 100.464362}
      alert_agencies: [MMEA]

    - id: ais_loss
      time: "00:10"
      type: AIS_LOSS
      description: Vessel deliberately disables AIS transponder.
      on_initiate: >
        AIS LOSS — MV Hai Long 7. Last known position 2.70°N 102.36°E.
        No distress signal. Vessel went deliberately dark.
      actionee: SUSPECT-001
      alert_agencies: [MMEA]
      severity: WARNING

    - id: anomaly_alert
      after: {event: ais_loss, phase: initiate, offset: "00:02:00"}
      type: ALERT
      description: MMEA raises alert — radar still tracking vessel.
      on_initiate: >
        MMEA Maritime Surveillance raises AIS anomaly alert. Contact
        still tracked on surface search radar — vessel continuing NW.
        Deliberate AIS suppression suspected.
      alert_agencies: [MMEA, MIL]
      severity: WARNING
      # Reclassify from neutral cargo to suspect
      reclassify:
        targets: [SUSPECT-001]
        new_type: SUSPECT_VESSEL

    - id: vessel_profile
      after: {event: anomaly_alert, phase: initiate, offset: "00:01:00"}
      type: ALERT
      description: Vessel profiled against shipping databases.
      on_initiate: >
        Lloyd's database: MV Hai Long 7, bulk carrier, last port
        Guangzhou, declared destination Port Klang. No dangerous cargo
        declared. AIS suppression unexplained.
      alert_agencies: [MMEA]
      severity: WARNING

    # ========================================
    # PHASE 2: MULTI-AGENCY RESPONSE
    # ========================================

    # The lead fast intercept craft (KM Penggalang) is the one we'll track
    # for intercept completion — it has the shortest transit time at 35 kn.
    - id: penggalang_intercept
      after: {event: vessel_profile, phase: initiate, offset: "00:01:00"}
      type: ORDER
      description: MMEA orders fast intercept — KM Penggalang closes on dark contact.
      on_initiate: >
        MMEA Director of Operations orders intercept. KM Penggalang
        (lead) underway at best speed to close on dark contact.
      actionee: MMEA-FI-001
      action: intercept
      target: SUSPECT-001
      speed: 35
      intercept_radius_nm: 0.3
      alert_agencies: [MMEA]
      on_complete: >
        KM Penggalang alongside MV Hai Long 7. Vessel hove to.
        Master on bridge wing. MMEA officers conducting initial
        inspection.
      on_complete_action: alongside

    - id: marlin_intercept
      after: {event: penggalang_intercept, phase: initiate}
      type: ORDER
      description: MMEA patrol vessel dispatched to join intercept.
      on_initiate: >
        KM Marlin dispatched to support. ETA on scene depends on
        transit distance.
      actionee: MMEA-PV-001
      action: intercept
      target: SUSPECT-001
      speed: 22
      intercept_radius_nm: 0.3
      alert_agencies: [MMEA]
      on_complete: >
        KM Marlin on scene — full MMEA intercept force assembled
        alongside MV Hai Long 7.
      on_complete_action: alongside

    - id: mpa_scramble
      after: {event: penggalang_intercept, phase: initiate, offset: "00:10:00"}
      type: ORDER
      description: RMAF MPA scrambled for aerial surveillance.
      on_initiate: >
        RMAF maritime patrol support requested. TUDM Peregrine 1
        airborne from Subang (10 min scramble) to establish 2 nm orbit
        around contact.
      actionee: RMAF-MPA-001
      action: intercept
      target: SUSPECT-001
      speed: 220
      altitude_m: 150
      intercept_radius_nm: 2.0
      alert_agencies: [MMEA, RMAF]
      on_complete: >
        RMAF Peregrine 1 on scene. FLIR confirms bulk carrier, no
        flag visible. Vessel attempting to blend into TSS traffic.
      on_complete_action: orbit
      orbit_center: SUSPECT-001
      orbit_radius_nm: 2.0
      orbit_speed: 150

    - id: rmn_pursue
      after: {event: penggalang_intercept, phase: initiate, offset: "00:02:00"}
      type: ORDER
      description: RMN directed to join pursuit.
      on_initiate: >
        MMEA notifies RMN. KD Keris directed to join pursuit of
        dark contact — close at best speed.
      actionee: RMN-PV-001
      action: intercept
      target: SUSPECT-001
      speed: 25
      intercept_radius_nm: 0.5
      alert_agencies: [MMEA, MIL]
      on_complete: >
        KD Keris on scene alongside MV Hai Long 7.
      on_complete_action: alongside

    - id: rmp_deploy
      after: {event: penggalang_intercept, phase: initiate, offset: "00:04:00"}
      type: ORDER
      description: RMP boarding team deployed from Port Klang.
      on_initiate: >
        RMP Marine Police boarding team deployed from Port Klang.
        PDRM Marine Klang 01 underway with eight-man boarding party.
      actionee: RMP-MP-001
      action: intercept
      target: SUSPECT-001
      speed: 35
      intercept_radius_nm: 0.15
      alert_agencies: [MMEA, RMP]
      on_complete: >
        PDRM Marine Klang 01 alongside. Boarding team crosses to
        suspect vessel via RHIB. Master and crew mustered on deck.
        Vessel documents and cargo manifests demanded.
      on_complete_action: alongside

    # ========================================
    # PHASE 3: EVASION
    # ========================================

    # SUSPECT accelerates to a mild evasion speed some minutes after AIS
    # loss. It won't outrun anything fast — purpose is to show the "evasion
    # profile" detection, not to make the chase impossible.
    - id: evasion_detected
      after: {event: penggalang_intercept, phase: initiate, offset: "00:08:00"}
      type: DETECTION
      description: Radar shows suspect increasing speed — evasion profile.
      on_initiate: >
        MMEA radar: dark contact speed increased to ~15 knots —
        evasion profile. Heading unchanged NW.
      actionee: SUSPECT-001
      action: escape
      bearing_deg: 315
      speed: 15
      alert_agencies: [MMEA]
      severity: WARNING

    # ========================================
    # PHASE 4: VISUAL / CLOSING (driven by actual intercept geometry)
    # ========================================

    # Fires when Peregrine reaches its 2 nm orbit — it's the first asset
    # overhead, 15–20 min before the fast boats can close the surface gap.
    - id: flir_jettison
      after: {event: mpa_scramble, phase: complete, offset: "00:03:00"}
      type: DETECTION
      description: MPA FLIR spots possible jettisoning of materials.
      on_initiate: >
        RMAF Peregrine 1: FLIR imagery shows deck crew activity —
        possible jettisoning of materials. Imagery transmitted to
        MMEA HQ.
      source: RMAF-MPA-001
      severity: CRITICAL
      alert_agencies: [MMEA, MIL, RMP]

    # VHF hail fires when KM Penggalang is within visual / VHF range —
    # intercept completes at 0.3 nm so this fires ~90 s before alongside.
    - id: vhf_no_response
      after: {event: penggalang_intercept, phase: complete}
      type: ALERT
      description: VHF hails — no response.
      on_initiate: >
        KM Penggalang: no response to VHF Channel 16 hails in English
        or Mandarin. Vessel hove to but master uncooperative.
      source: MMEA-FI-001
      alert_agencies: [MMEA, RMP]
      severity: WARNING
      # Force the suspect to slow to a stop for the boarding.
      actionee: SUSPECT-001
      action: hold_station

    # ========================================
    # PHASE 5: BOARDING & RESOLUTION
    # ========================================

    - id: rmp_boarding
      after: {event: rmp_deploy, phase: complete}
      type: BOARDING
      description: RMP boarding team crosses to suspect vessel.
      on_initiate: >
        PDRM Marine Klang 01 alongside. Eight-man RMP boarding team
        cross-decks via RHIB. Master and crew mustered on deck.
        Vessel documents and cargo manifests demanded.
      source: RMP-MP-001
      alert_agencies: [MMEA, RMP]

    - id: cargo_discrepancy
      after: {event: rmp_boarding, phase: initiate, offset: "00:02:00"}
      type: DETECTION
      description: Boarding team discovers cargo manifest discrepancy.
      on_initiate: >
        RMP boarding team: manifest lists steel coils — FLIR signature
        inconsistent with declared cargo. Discrepancy reported. Customs
        notified. Vessel to be escorted to Port Klang.
      source: RMP-MP-001
      severity: CRITICAL
      alert_agencies: [MMEA, RMP, CI]

    - id: endstate
      after: {event: cargo_discrepancy, phase: initiate, offset: "00:02:00"}
      type: RESOLUTION
      description: Scenario complete — vessel detained under escort.
      on_initiate: >
        ENDSTATE: MV Hai Long 7 detained under escort to Port Klang.
        Multi-agency coordination successful — MMEA, RMAF, RMN, RMP.
        Dark target detected, tracked, and intercepted.
      alert_agencies: [MMEA, MIL, RMP, CI]
