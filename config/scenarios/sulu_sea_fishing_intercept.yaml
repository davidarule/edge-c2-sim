        - { lat: 5.65, lon: 118.70, speed: 12, time: "00:00" }
        - { lat: 5.66, lon: 118.72, speed: 12, time: "00:03" }
        # ORDER T+04 — divert to investigate fleet at best speed
        - { lat: 5.67, lon: 118.73, speed: 22, time: "00:05" }
        - { lat: 5.69, lon: 118.76, speed: 22, time: "00:12" }
        - { lat: 5.71, lon: 118.79, speed: 22, time: "00:20" }
        # Approaching fleet — reducing speed
        - { lat: 5.72, lon: 118.81, speed: 15, time: "00:25" }
        # Alongside IFF-001 — fleet starts scattering
        - { lat: 5.70, lon: 118.80, speed: 22, time: "00:28" }
        # Pursues IFF-001 south
        - { lat: 5.65, lon: 118.75, speed: 22, time: "00:32" }
        # Intercept — alongside Trawler 1
        - { lat: 5.62, lon: 118.72, speed: 5, time: "00:33" }
        # Station keeping — boarding operations
        - { lat: 5.62, lon: 118.72, speed: 2, time: "00:45" }
        # Escort to Sandakan
        - { lat: 5.65, lon: 118.60, speed: 8, time: "00:50" }
        - { lat: 5.70, lon: 118.45, speed: 8, time: "00:55" }
