    # ── RMP MARINE POLICE ────────────────────────────────────────

    - id: "RMP-MP-101"
      type: RMP_MARINE_PATROL
      callsign: "PDRM Marine 01"
      agency: RMP
      initial_position: { lat: 5.77, lon: 118.46 }
      behavior: "patrol"
      waypoints:
        # On patrol — Sandakan approaches
        - { lat: 5.77, lon: 118.46, speed: 15, time: "00:00" }
        - { lat: 5.78, lon: 118.48, speed: 15, time: "00:05" }
