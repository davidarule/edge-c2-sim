        - { lat: 5.65, lon: 118.75, speed: 80, time: "00:48" }
        - { lat: 5.70, lon: 118.80, speed: 80, time: "00:52" }
        - { lat: 5.65, lon: 118.75, speed: 80, time: "00:55" }
