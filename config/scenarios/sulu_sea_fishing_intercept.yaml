        - { lat: 5.90, lon: 118.82, speed: 35, time: "00:15" }
        - { lat: 5.88, lon: 118.90, speed: 35, time: "00:22" }
        # Positioning to block eastern escape route
        - { lat: 5.87, lon: 118.98, speed: 35, time: "00:28" }
