  # ================================================================
  # EVENTS TIMELINE
  # ================================================================
  events:

    - time: "00:00"
      type: "DETECTION"
      description: "SPEXER 2000 coastal radar Station 6 detects cluster of 5+ unidentified contacts in Malaysian EEZ, position 5.75°N 118.85°E. No AIS signals. Contacts moving slowly — 3-4 knots, typical fishing pattern. Reported to ESSCOM Fusion Centre."
      position: { lat: 5.75, lon: 118.85 }
      alert_agencies: [MMEA, MIL]
      severity: "WARNING"

    - time: "00:02"
      type: "ALERT"
      description: "ESSCOM Fusion Centre correlates radar contacts with INTEL Report 2026-0412: Vietnamese IUU fishing fleet reported crossing from Philippine waters 48 hours ago. Fleet profile matches — 4-5 steel-hull trawlers plus one larger mothership/reefer vessel. Assessment: HIGH CONFIDENCE illegal fishing operation in Malaysian EEZ."
      alert_agencies: [MMEA, MIL, RMP, CI]
      severity: "WARNING"

    - time: "00:04"
      type: "ORDER"
      description: "ESSCOM directs MMEA KM Sangitan (nearest patrol vessel, 11nm from contacts) to investigate. KM Sangitan altering course, proceeding at best speed 22 knots. ETA 29 minutes."
      target: "MMEA-PV-102"
      action: "intercept"
