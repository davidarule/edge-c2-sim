        - { lat: 5.62, lon: 118.60, speed: 12, time: "00:05" }
        # ORDER T+10 — divert to fleet area, focus on mothership
        - { lat: 5.64, lon: 118.62, speed: 22, time: "00:12" }
        - { lat: 5.70, lon: 118.72, speed: 22, time: "00:22" }
        - { lat: 5.78, lon: 118.85, speed: 22, time: "00:32" }
        # Pursuing mothership NE
        - { lat: 5.83, lon: 118.92, speed: 22, time: "00:38" }
        - { lat: 5.86, lon: 118.98, speed: 22, time: "00:42" }
        # Alongside mothership
        - { lat: 5.88, lon: 119.02, speed: 5, time: "00:45" }
        # Station keeping
        - { lat: 5.88, lon: 119.02, speed: 2, time: "00:55" }
