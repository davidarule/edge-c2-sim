        - { lat: 5.55, lon: 118.58, speed: 15, time: "00:00" }
        - { lat: 5.56, lon: 118.60, speed: 15, time: "00:05" }
        # ORDER T+16 — sprint north to cut off southern escape
        - { lat: 5.35, lon: 118.68, speed: 40, time: "00:18" }
        - { lat: 5.45, lon: 118.72, speed: 40, time: "00:25" }
        - { lat: 5.55, lon: 118.73, speed: 40, time: "00:30" }
        # Intercepting IFF-002 and IFF-003 heading SW
        - { lat: 5.65, lon: 118.70, speed: 40, time: "00:36" }
        - { lat: 5.68, lon: 118.65, speed: 10, time: "00:42" }
        # Station keeping — assists with boarding
        - { lat: 5.68, lon: 118.65, speed: 2, time: "00:55" }
