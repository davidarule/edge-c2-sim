        - { lat: 5.82, lon: 118.95, speed: 180, time: "00:32" }
        - { lat: 5.86, lon: 119.05, speed: 180, time: "00:36" }
        # Orbiting intercept area
        - { lat: 5.88, lon: 119.08, speed: 140, time: "00:40" }
        - { lat: 5.85, lon: 119.02, speed: 140, time: "00:45" }
        - { lat: 5.82, lon: 118.95, speed: 140, time: "00:50" }
