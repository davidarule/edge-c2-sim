# Illegal Fishing Fleet Intercept — Sulu Sea / ESSZONE
# Version: 2.0 | Rebuilt: April 2026
#
# ── METHODOLOGY ─────────────────────────────────────────────────────────────
# Built using edge-c2-scenario-SKILL.md 8-step methodology.
# Forces from reference/orbat/malaysia.yaml, entity_types.yaml.
# All response forces pre-positioned on ESSZONE active patrol — realistic for
# permanent high-readiness posture in Eastern Sabah Security Zone.
#
# ── PHYSICS VALIDATION ──────────────────────────────────────────────────────
# cos(5.7°) ≈ 0.9951, 1°lon ≈ 59.7nm
#
#   KM Sangitan to fleet:    10.8nm @ 22kn  = 29min  ORDER T+04  ARR T+33  ✓
#   MPA to fleet:            34.0nm @ 220kn =  9min  ORDER T+06  ARR T+15  ✓
#   G2000 Alpha to flee pt:  14.9nm @ 35kn  = 26min  ORDER T+08  ARR T+34  ✓
#   KM Semporna to fleet:    16.1nm @ 22kn  = 44min  ORDER T+10  ARR T+54  ✓
#   KM Kilat 3 to south:     17.5nm @ 40kn  = 26min  ORDER T+16  ARR T+42  ✓
#   RMP Marine 02 to fleet:  20.0nm @ 35kn  = 34min  ORDER T+18  ARR T+52  ✓
#   EC725 to fleet:          49.4nm @ 150kn = 20min  ORDER T+20  ARR T+40  ✓
#   KD Keris to boundary:    14.3nm @ 22kn  = 39min  ORDER T+28  ARR T+67  (patrol)
#
# ── FORCES ──────────────────────────────────────────────────────────────────
#   MMEA-PV-102:  KM Sangitan — MMEA OPV on Darvel Bay patrol (nearest)
#   MMEA-PV-101:  KM Semporna — MMEA OPV on ESSZONE Sector 2 patrol
#   MMEA-FI-101:  KM Kilat 3 — MMEA fast intercept craft on southern patrol
#   RMN-FIC-101:  KD G2000 Alpha — RMN Fast Interceptor Craft on NE patrol
#   RMN-PV-101:   KD Keris — RMN patrol vessel on Sulu Sea patrol
#   RMAF-MPA-101: TUDM MPA Beechcraft — already airborne on patrol
#   RMAF-HELI-101: TUDM EC725 — Lahad Datu FOB
#   RMP-MP-101:   PDRM Marine 01 — on patrol near Sandakan approaches
#   RMP-MP-102:   PDRM Marine 02 — on patrol ESSZONE
#   CI-TEAM-101:  Customs Boarding Team A — Sandakan Harbor
#   CI-IMMI-101:  Immigration Team Sandakan — Sandakan Harbor
#   IFF-001..005: Vietnamese IUU fishing fleet (5 vessels)
#
# ── DEMO NOTES ──────────────────────────────────────────────────────────────
# Duration: 55 min. Recommended: 3x (18 min), 5x (11 min).
# Pause at T+14 (MPA confirms fleet) for visual impact — 5 red diamonds.
# Pause at T+25 (fleet scatters) — show the audience the pursuit vectors.
# Strong message: ESSZONE multi-agency coordination is ALWAYS ON.

scenario:
  name: "Illegal Fishing Fleet Intercept — Sulu Sea"
  description: |
    Coastal surveillance radar detects a cluster of unidentified vessels
    operating inside Malaysia's Exclusive Economic Zone off eastern Sabah.
    ESSCOM Fusion Centre correlates the contacts with intelligence reports
    of a Vietnamese fishing fleet that crossed from Philippine waters.

    MMEA, supported by RMN and RMAF assets already deployed on ESSZONE
    patrol, intercepts the fleet. The fishing vessels scatter when they
    detect approaching enforcement assets, but are systematically corralled
    by converging forces. RMP Marine Police conducts boarding operations.
    Customs and Immigration processes detained foreign crew at Sandakan port.

    Demonstrates: ESSZONE multi-agency coordination, SPEXER radar detection,
    IUU fishing enforcement, maritime pursuit and intercept, coordinated
    fleet corralling, RMP boarding operations, and Customs/Immigration
    crew processing.
  duration_minutes: 55
  center: { lat: 5.75, lon: 118.85 }
  zoom: 10

  include_entities:
  - ais_background_esszone.yaml
  background_entities: []

  # ================================================================
  # SCENARIO ENTITIES
  # ================================================================
  scenario_entities:

    # ── IUU FISHING FLEET (5 trawlers + 1 mothership) ────────────
    # Vietnamese flag, no AIS, operating illegally in Malaysian EEZ.
    # Fleet concentrated around 5.75°N 118.85°E, drifting slowly.
    # At T+25 fleet scatters — individual escape vectors.

    - id: "IFF-001"
      type: SUSPECT_VESSEL
      callsign: "Unknown Trawler 1"
      initial_position: { lat: 5.75, lon: 118.85 }
      waypoints:
        - { lat: 5.75, lon: 118.85, speed: 4, time: "00:00" }
        - { lat: 5.73, lon: 118.83, speed: 3, time: "00:10" }
        - { lat: 5.71, lon: 118.81, speed: 3, time: "00:20" }
        # Fleet scatters — this one heads south
        - { lat: 5.65, lon: 118.75, speed: 8, time: "00:28" }
        # Intercepted by KM Sangitan
        - { lat: 5.62, lon: 118.72, speed: 2, time: "00:33" }
        - { lat: 5.62, lon: 118.72, speed: 0, time: "00:35" }
        - { lat: 5.62, lon: 118.72, speed: 0, time: "00:55" }
      metadata:
        ais_active: false
        flag: "VNM"
        vessel_type: "Steel-hull trawler"
        estimated_crew: 15

    - id: "IFF-002"
      type: SUSPECT_VESSEL
      callsign: "Unknown Trawler 2"
      initial_position: { lat: 5.77, lon: 118.83 }
      waypoints:
        - { lat: 5.77, lon: 118.83, speed: 4, time: "00:00" }
        - { lat: 5.75, lon: 118.81, speed: 3, time: "00:10" }
        - { lat: 5.73, lon: 118.79, speed: 3, time: "00:20" }
        # Scatters west
        - { lat: 5.70, lon: 118.70, speed: 9, time: "00:28" }
        - { lat: 5.68, lon: 118.65, speed: 5, time: "00:35" }
        # Stopped by KM Kilat 3
        - { lat: 5.68, lon: 118.65, speed: 0, time: "00:42" }
        - { lat: 5.68, lon: 118.65, speed: 0, time: "00:55" }
      metadata:
        ais_active: false
        flag: "VNM"
        estimated_crew: 12

    - id: "IFF-003"
      type: SUSPECT_VESSEL
      callsign: "Unknown Trawler 3"
      initial_position: { lat: 5.73, lon: 118.87 }
      waypoints:
        - { lat: 5.73, lon: 118.87, speed: 4, time: "00:00" }
        - { lat: 5.71, lon: 118.85, speed: 3, time: "00:10" }
        - { lat: 5.69, lon: 118.83, speed: 3, time: "00:20" }
        # Scatters SW
        - { lat: 5.63, lon: 118.78, speed: 8, time: "00:28" }
        - { lat: 5.58, lon: 118.75, speed: 4, time: "00:35" }
        # Stopped
        - { lat: 5.58, lon: 118.75, speed: 0, time: "00:42" }
        - { lat: 5.58, lon: 118.75, speed: 0, time: "00:55" }
      metadata:
        ais_active: false
        flag: "VNM"
        estimated_crew: 10

    - id: "IFF-004"
