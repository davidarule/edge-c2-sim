      initial_position: { lat: 5.78, lon: 118.88 }
      waypoints:
        - { lat: 5.78, lon: 118.88, speed: 3, time: "00:00" }
        - { lat: 5.76, lon: 118.86, speed: 3, time: "00:10" }
        - { lat: 5.74, lon: 118.84, speed: 3, time: "00:20" }
        # Fleet leader — tries to flee toward Philippine waters at max speed
        - { lat: 5.80, lon: 118.95, speed: 11, time: "00:28" }
        - { lat: 5.85, lon: 119.05, speed: 12, time: "00:35" }
        # Intercepted by G2000 Alpha before reaching boundary
        - { lat: 5.87, lon: 119.08, speed: 2, time: "00:38" }
        - { lat: 5.87, lon: 119.08, speed: 0, time: "00:40" }
        - { lat: 5.87, lon: 119.08, speed: 0, time: "00:55" }
      metadata:
        ais_active: false
        flag: "VNM"
        note: "Fleet leader — attempts to flee to Philippine waters"
        estimated_crew: 18

    - id: "IFF-005"
      type: SUSPECT_VESSEL
      callsign: "Unknown Mothership"
      initial_position: { lat: 5.82, lon: 118.92 }
      waypoints:
        - { lat: 5.82, lon: 118.92, speed: 5, time: "00:00" }
        - { lat: 5.80, lon: 118.90, speed: 4, time: "00:10" }
        - { lat: 5.78, lon: 118.88, speed: 3, time: "00:20" }
        # Mothership heavier, slower — tries to flee NE
        - { lat: 5.83, lon: 118.95, speed: 8, time: "00:28" }
        - { lat: 5.87, lon: 119.00, speed: 8, time: "00:35" }
