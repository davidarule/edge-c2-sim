    # ── CUSTOMS & IMMIGRATION (SANDAKAN PORT) ────────────────────

    - id: "CI-TEAM-101"
      type: CI_OFFICER
      callsign: "Customs Boarding Team A"
      agency: CI
      initial_position: { lat: 5.84, lon: 118.12 }
      behavior: "standby"
      waypoints:
        - { lat: 5.84, lon: 118.12, speed: 0, time: "00:00" }
        - { lat: 5.84, lon: 118.12, speed: 0, time: "00:55" }
