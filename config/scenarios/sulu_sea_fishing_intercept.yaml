        - { lat: 5.55, lon: 118.59, speed: 15, time: "00:05" }
        # ORDER T+18 — proceed to fleet area
        - { lat: 5.53, lon: 118.55, speed: 35, time: "00:19" }
        - { lat: 5.58, lon: 118.62, speed: 35, time: "00:25" }
        - { lat: 5.62, lon: 118.68, speed: 35, time: "00:32" }
        # Arriving — IFF-002 and IFF-003 stopped
        - { lat: 5.66, lon: 118.68, speed: 35, time: "00:38" }
        # Alongside IFF-002/003 for boarding
        - { lat: 5.68, lon: 118.65, speed: 5, time: "00:44" }
        # Boarding operations
        - { lat: 5.68, lon: 118.65, speed: 2, time: "00:55" }
      metadata:
        vessel_type: "Rigid Hull Fender Boat"
        equipment: ["FLIR", "NVG", "boarding_kit"]
