        flag: "VNM"
        vessel_type: "Reefer/mothership"
        estimated_crew: 25
        note: "Larger vessel collecting catch from fleet. 40 tonnes estimated."

    # ── MMEA ENFORCEMENT ASSETS ──────────────────────────────────

    - id: "MMEA-PV-102"
      type: MMEA_PATROL
      callsign: "KM Sangitan"
      agency: MMEA
      initial_position: { lat: 5.65, lon: 118.70 }
      behavior: "patrol"
      waypoints:
