        - { lat: 5.88, lon: 119.02, speed: 2, time: "00:42" }
        - { lat: 5.88, lon: 119.02, speed: 0, time: "00:45" }
        - { lat: 5.88, lon: 119.02, speed: 0, time: "00:55" }
      metadata:
