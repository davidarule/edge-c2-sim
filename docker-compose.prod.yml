services:
  # --- Nginx Reverse Proxy ---
  # DISABLED: Host-level nginx handles SSL termination and proxying.
  # The edge-c2-sim nginx container cannot bind ports 80/443 because the
  # host nginx (serving multiple sites) already occupies them.
  # See /etc/nginx/sites-available/ec2sim.brumbiesoft.org on the server.
  # nginx:
  #   build: ./nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - cop
  #     - simulator
  #     - auth-service
  #   networks:
  #     - edge_c2_net
  #   restart: unless-stopped

  # --- Auth Service ---
  auth-service:
    build: ./auth
    ports:
      - "127.0.0.1:8280:8080"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRY_HOURS=${JWT_EXPIRY_HOURS:-24}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN:-.brumbiesoft.org}
      - COOKIE_SECURE=true
      - ADMIN_BOOTSTRAP=true
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    volumes:
      - auth_data:/data
    networks:
      - edge_c2_net
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/auth/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Simulator ---
  simulator:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - SCENARIO=${SCENARIO:-config/scenarios/demo_combined.yaml}
      - SIM_SPEED=${SIM_SPEED:-1}
      - JWT_SECRET=${JWT_SECRET}
      - WS_AUTH=${WS_AUTH:-true}
      - AISSTREAM_API_KEY=${AISSTREAM_API_KEY:-}
      - AIS_MAX_ENTITIES=${AIS_MAX_ENTITIES:-300}
      - AIS_UPDATE_INTERVAL=${AIS_UPDATE_INTERVAL:-30}
      - AIS_STALE_SECONDS=${AIS_STALE_SECONDS:-300}
    volumes:
      - ./config:/app/config
      - ./geodata:/app/geodata
      - ./logs:/app/logs
      - ./scripts:/app/scripts
      - ./simulator:/app/simulator
    ports:
      - "127.0.0.1:8765:8765"
      - "127.0.0.1:8766:8766"
    command: >
      python -m scripts.run_simulator
        --scenario ${SCENARIO:-config/scenarios/demo_combined.yaml}
        --speed ${SIM_SPEED:-1}
        --transport ws,console
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8766/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - edge_c2_net
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # --- COP Dashboard ---
  cop:
    build:
      context: ./cop
      args:
        - VITE_CESIUM_ION_TOKEN=${CESIUM_ION_TOKEN}
        - VITE_WS_URL=wss://ec2sim.brumbiesoft.org/ws
    ports:
      - "127.0.0.1:3200:3000"
    volumes:
      - ./geodata:/geodata:ro
    networks:
      - edge_c2_net
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  edge_c2_net:
    driver: bridge

volumes:
  auth_data:
